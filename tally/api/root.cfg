[
{
    "name": "getVipTmpl",
    "method":"GET",
    "property" : "private",
    "tokenChecker" : "USER",
    "comment":"查看模板信息",
    
    "process" : [{
        "name": "get_vip_template",
        "type": "call",
        "service":"config",
        "method":"GET",
        "url":"/get?k=vip_template&as=template",
        "tokenSign":"APP"
    }],

    "response":[
         {"name":"template", "type":"json"}
    ]
},
{
    "name": "userInfo",
    "method":"GET",
    "property" : "private",
    "tokenChecker" : "USER",
    "comment":"查看用户的提成比率信息",

    "request": [
        {"name":"account", "type":"string", "must":true, "min":1}
    ],

    "process" : [
        {
            "name": "get_service_ratio",
            "type": "call",
            "service":"config",
            "cache":"service_ratio",
            "method":"GET",
            "url":"/getWithDefault?k=service_ratio&as=service_ratio&v=0.4",
            "tokenSign":"APP"
        },
        {
            "name": "get_order_ratio",
            "type": "call",
            "service":"config",
            "cache":"order_ratio",
            "method":"GET",
            "url":"/getWithDefault?k=order_ratio&as=order_ratio&v=0.05",
            "tokenSign":"APP"
        },
        {
            "name": "get_user_info", //返回基本信息、当前服务的扩展信息
            "type": "call",
            "service":"user",
            "method":"GET",
            "cache":"@{account}",
            "url":"/user/getByApp?account=@{account}",
            "tokenSign":"APP"
        },
        {
            "name" : "get_task_num",
            "type" : "rdb",
            "db": "member",
            "sqls":[{
                "name":"count_task_num",
                "multi":false,
                "metas":"each",
                "merge":true,
                "sql":"select count(*) taskNum from suppliers
                  where account='@{account}'
                    and start<@{NOW|unit60000} and end=0"
            }]
        }
    ]
}
]