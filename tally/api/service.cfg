[
{
    "name": "create",
    "method":"POST",
    "property" : "private",
    "tokenChecker" : "USER",
    "comment":"创建服务单，admin、客服都可以创建，admin可以确认所有服务单，客服只能确认自己创建的服务单",

    "request": [
        {"name":"vip", "type":"int", "must":true, "min":0, "comment":"会员id"},
        {"name":"val", "type":"float", "must":true, "min":0, "comment":"消费额：次或金额"},
        {"name":"suppliers", "type":"object", "list":true, "must":true, "props":[
            {"name":"account", "type":"string", "must":true, "regular":"^[a-zA-Z0-9_]{1,30}$", "comment":"提供服务的员工帐号"},
            {"name":"ratio", "type":"float", "must":true, "min":0, "max":1, "comment":"提成比率"}
        ]},
        {"name":"cmt", "type":"string", "must":false, "default":""}
    ],

    "process" : [
        {
            "name" : "check_balance",
            "type" : "dataexists",
            "db": "member",
            "expect":true,
            "sql": "select 1 from vips where id=@{vip} and balance>=@{val}",
            "errorCode":30001,
            "errorInfo":"no sufficient funds"
        },
        {
            "name":"get_consume_id",
            "type" : "var",
            "vars":[
                {"name":"serviceId", "val":"@{SEQUENCE|'serviceid'}"}
            ]
        },
        {
            "name" : "consume",
            "type" : "rdb",
            "db": "member",
            "sqls" : [
                "insert into services(id,vip,creator,createAt,val,cmt)
                 values(@{serviceId},@{vip},'@{#tokenAcc}',@{NOW|unit60000},@{val},'@{cmt}')",
                "insert into suppliers(service,account,ratio,createAt) values
                @{FOR|suppliers, `,`, `(@{serviceId},'`, e.account, `',`, e.ratio, `,@{NOW|unit60000})`}"
            ]
        }
    ],
    "response":[]
},

{
    "name": "confirm",
    "method":"PUT",
    "property" : "private",
    "tokenChecker" : "USER",
    "aclChecker":"RoAAC",
    "feature": "write",
    "comment":"确认服务单",

    "request": [
        {"name":"id", "type":"int", "must":true, "min":0, "comment":"服务单id"}
    ],

    "aclProcess" : [{
        "name":"confirm_creator",
        "type":"dataexists",
        "db":"member",
        "expect":true,
        "errorCode":"NO_RIGHT",
        "errorInfo":"no right",
        "sql" :"select * from services where id=@{id} and creator='@{#tokenAcc}'"
    }],
    
    "process" : [
        {
            "name" : "get_service_info",
            "type" : "rdb",
            "db": "member",
            "sqls" : [
                {
                    "name":"get_service_info",
                    "metas" : "each",
                    "multi":false,
                    "merge":true,
                    "sql":"select vip,val,state,creator
                        from services where id=@{id}"
                },
                {
                    "name":"suppliers",
                    "metas":"each",
                    "multi":true,
                    "merge":false,
                    "sql":"select account,ratio
                        from suppliers where service=@{id}"
                }
            ],
            "onSuccess" : {
                "condition":"@{CONDITION|!state,'s.==','END'}",
                "errorCode":30003,
                "errorInfo":"invalid service state"
            }
        },
        {
            "name":"get_total_ratio",
            "type":"var",
            "vars":[
                {"name":"totalRatio", "val":"@{SUM|f.3,!suppliers,'ratio'}"},
                {"name":"brokerage", "val":"@{MULTI|d.2,totalRatio,!val}"},
                {"name":"at", "val":"@{NOW|unit3600000}"},
                {"name":"mAt", "val":"@{NOW|unit60000}"}
            ]
        },
        {
            "name" : "confirm_service",
            "type" : "rdb",
            "db": "member",
            "sqls" : [
                {
                    "expect":{"num":1,"errorCode":30001,"errorInfo":"no sufficient funds"},
                    "sql":"update vips set balance=balance-@{!val}
                            where id=@{!vip} and balance>@{!val}"
                },

                "update services set state='OK' where id=@{id}",
                "insert or ignore into reports(at) values(@{at})",

                "update reports set
                    nService=nService+1,
                    vService=vService+@{!val},
                    brokerage=brokerage+@{brokerage}
                 where at=@{at}",

                "insert into brokerages(did,type,ratio,brokerage,createAt,owner) values
                 @{FOR|!suppliers, `,`, `(@{id},'SRV',`, e.ratio, `,`, e.ratio, `*@{!val},@{mAt},'`, e.account, `')`}"
            ]
        }
    ],
    "response":[]
},

{
    "name": "remove",
    "method":"DELETE",
    "property" : "private",
    "tokenChecker" : "USER",
    "aclChecker":"RoAAC",
    "feature": "write",
    "comment":"删除服务单信息，只有admin或创建者可以删除，且状态必须为wait",

    "request": [
        {"name":"id", "type":"int", "must":true, "min":0, "comment":"订单id"}
    ],

    "aclProcess" : [{
        "name":"confirm_submitter",
        "type":"dataexists",
        "db":"member",
        "expect":true,
        "errorCode":"NO_RIGHT",
        "errorInfo":"no right",
        "sql" :"select * from services where id=@{id} and creator='@{#tokenAcc}'"
    }],

    "process" : [
        {
            "name":"remove_service",
            "type":"rdb",
            "db":"member",
            "sqls" : [{
                "expected":{"num":1,"errorCode":30004,"errorInfo":"not exists or invalid state"},
                "sql":"delete from services where id=@{id} and state='WAIT'"
            }]
        }
    ]
},

{
    "name": "list",
    "method":"GET",
    "property" : "private",
    "tokenChecker" : "USER",
    "aclChecker":"RBAC",
    "feature":"read",
    "comment":"查看一个会员的所有服务单",
            
    "request": [
        {"name":"vip", "type":"int", "must":true, "min":0, "comment":"会员id"},
        {"name":"offset", "type":"int", "must":true, "min":0, "comment":"偏移"},
        {"name":"num", "type":"int", "must":true, "min":1, "comment":"返回行数"}
    ],

    "process" : [
        {
            "name" : "list",
            "type" : "rdb",
            "db": "member",
            "sqls" : [
                {
                    "name":"list",
                    "metas":"cols",
                    "multi":true,
                    "sql":"select id,createAt,val,state,creator,cmt from services
                        where vip=@{vip}
                      order by createAt desc
                     LIMIT @{num} OFFSET @{offset}"
                },
                {
                    "name":"stat",
                    "metas":"each",
                    "multi":false,
                    "merge":true,
                    "sql":"select count(*) total,ifnull(sum(val),0) val from services
                        where vip=@{vip}"
                }
            ]
        }
    ]
},

{
    "name": "my",
    "method":"GET",
    "property" : "private",
    "tokenChecker" : "USER",
    "comment":"我创建的服务单信息",

    "request": [
        {"name":"state", "type":"string", "must":true, "options":["OK","WAIT","ALL"]},
        {"name":"offset", "type":"int", "min":0, "default":0},
        {"name":"num", "type":"int", "min":5, "default":20}
    ],
 
    "vars": [
        {"name":"end", "val":"@{NOW|unit60000}"}, //分钟
        {"name":"start", "val":"@{SUB|i,end,43200}"} //30天
    ],
    
    "process" : [
        {
            "name" : "my_list",
            "type" : "rdb",
            "db": "member",
            "sqls" : [
                {
                     "name": "list",
                     "multi":true,
                     "metas":"cols",
                     "sql":"select s.id,s.createAt,s.val,s.creator,s.cmt,s.state,v.name,v.code
                              from services s,vips v
                             where s.creator='@{#tokenAcc}'
                               @{CONDITION|state,'s.==','ALL',``,`and s.state='@{state}'`}
                               and v.id=s.vip
                             order by s.createAt desc
                             LIMIT @{num} OFFSET @{offset}"
                },
                {
                     "name":"total",
                     "multi":false,
                     "metas":"each",
                     "merge":true,
                     "sql":"select count(*) total from services
                         where creator='@{#tokenAcc}'
                           @{CONDITION|state,'s.==','ALL',``,`and state='@{state}'`}"
                },
                {
                    "name":"score",
                    "multi":false,
                    "metas":"each",
                    "merge":true,
                    "sql":"select ifnull(sum(val),0) vService,count(*) nService from services
                        where creator='@{#tokenAcc}'
                          and createAt>@{start}-1 and createAt<@{end}+1
                          @{CONDITION|state,'s.==','ALL',``,`and state='@{state}'`}"
                },
                {
                    "name":"month_brokerage",
                    "multi":false,
                    "metas":"each",
                    "merge":true,
                    "sql":"select ifnull(sum(brokerage),0) vBrokerage from brokerages
                        where createAt>@{start}-1 and createAt<@{end}+1
                          and owner='@{#tokenAcc}' and type='SRV'"
                }
            ]
        }
    ]
},

{
    "name": "myTask",
    "method":"GET",
    "property" : "private",
    "tokenChecker" : "USER",
    "comment":"我提供服务的服务单信息",

    "request": [
        {"name":"state", "type":"string", "must":true, "options":["OK","WAIT","ALL"]},
        {"name":"offset", "type":"int", "min":0, "default":0},
        {"name":"num", "type":"int", "min":5, "default":20}
    ],

    "vars": [
        {"name":"end", "val":"@{NOW|unit60000}"}, //分钟
        {"name":"start", "val":"@{SUB|i,end,43200}"} //30天
    ],

    "process" : [{
        "name" : "my_list",
        "type" : "rdb",
        "db": "member",
        "sqls" : [
            {
                 "name": "list",
                 "multi":true,
                 "metas":"cols",
                 "sql":"select s.id,s.createAt,s.val,s.creator,s.cmt,
                          s.state,v.name,v.code,v.balance,v.total
                         from suppliers su,services s,vips v
                        where su.account='@{#tokenAcc}'
                          and s.id=su.service
                        @{CONDITION|state,'s.==','ALL',``,`and s.state='@{state}'`}
                        and v.id=s.vip
                       order by su.createAt desc
                      LIMIT @{num} OFFSET @{offset}"
            },
            {
                 "name":"total",
                 "multi":false,
                 "metas":"each",
                 "merge":true,
                 "sql":"select count(*) total,ifnull(sum(s.val),0) val from suppliers su,services s
                     where su.account='@{#tokenAcc}'
                       @{CONDITION|state,'s.==','ALL',``,`and s.state='@{state}'`}
                       and s.id=su.service"
            },
            {
                "name":"month_brokerage",
                "multi":false,
                "metas":"each",
                "merge":true,
                "sql":"select ifnull(sum(brokerage),0) vBrokerage from brokerages
                    where createAt>@{start}-1 and createAt<@{end}+1
                      and type='SRV'"
            }
        ]
    }]
},

{
    "name": "get",
    "method":"GET",
    "property" : "private",
    "tokenChecker" : "USER",
    "aclChecker":"RoAAC",
    "feature":"read",
    "comment":"查看服务单详细信息，超级管理员或创建者可调用",
    
    "request": [
        {"name":"id", "type":"int", "must":true, "min":0, "comment":"服务id"}
    ],
    
    "aclProcess" : [{
        "name":"check_right",
        "type":"dataexists",
        "expect":true,
        "db": "member",
        "sql":"select 1 from services where id=@{id} and creator='@{#tokenAcc}'
            union select 1 from suppliers where service=@{id} and account='@{#tokenAcc}'"
    }],
    
    "process" : [{
        "name": "get_service_info",
        "type": "rdb",
        "db":"member",
        "sqls" : [
            {
                "name":"service",
                "metas":"each",
                "multi":false,
                "merge":true,
                "sql":"select s.createAt,s.val,s.creator,s.cmt,
                        s.state,v.name,v.code,v.total,v.balance
                     from services s,vips v
                    where s.id=@{id} and v.id=s.vip"
            },
            {
                "name":"suppliers",
                "metas":"each",
                "multi":true,
                "merge":false,
                "sql":"select account,start,end,ratio from suppliers where service=@{id}"
            }
        ]}
    ]
},
{
    "name":"listAll",
    "method":"GET",
    "property": "private",
    "tokenChecker": "USER",
    "aclChecker": "RBAC",
    "feature":"admin",

    "request": [
        {"name":"state", "type":"string", "must":true, "options":["OK","WAIT","ALL"], "comment":"服务状态"},
        {"name":"offset", "type":"int", "must":true, "min":0, "comment":"偏移"},
        {"name":"num", "type":"int", "must":true, "min":1, "comment":"返回行数"}
    ],

    "vars": [
        {"name":"end", "val":"@{NOW|unit3600000}"},
        {"name":"start", "val":"@{SUB|i,end,720}"}, //30天
        {"name":"mEnd", "val":"@{NOW|unit60000}"}, //分钟
        {"name":"mStart", "val":"@{SUB|i,end,43200}"} //30天
    ],

    "process" : [
        {
            "name" : "list_services",
            "type" : "rdb",
            "db": "member",
            "sqls" : [
                {
                    "name":"list",
                    "metas":"cols",
                    "multi":true,
                    "sql":"select s.id,s.createAt,s.val,s.creator,s.cmt,s.state,v.name,v.code
                         from services s,vips v
                        where @{CONDITION|state,'s.==','ALL',`s.state in('OK','WAIT','END')`,`s.state='@{state}'`}
                          and v.id=s.vip
                      order by s.createAt desc
                     LIMIT @{num} OFFSET @{offset}"
                },
   
                {
                    "name":"total",
                    "metas":"each",
                    "multi":false,
                    "merge":true,
                    "sql":"select count(*) total from services 
                        @{CONDITION|state,'s.==','ALL',``,`where state='@{state}'`}"
                },
                {
                    "name":"month_score",
                    "multi":false,
                    "metas":"each",
                    "merge":true,
                    "sql":"select ifnull(sum(vService),0) vService,ifnull(sum(nService),0) nService
                         from reports
                        where at>@{start}-1 and at<@{end}+1"
                },
                {
                    "name":"month_brokerage",
                    "multi":false,
                    "metas":"each",
                    "merge":true,
                    "sql":"select ifnull(sum(brokerage),0) vBrokerage from brokerages
                        where createAt>@{mStart}-1 and createAt<@{mEnd}+1
                          and type='SRV'"
                }
            ]
        }
    ]
},
{
    "name": "start",
    "method":"PUT",
    "property" : "private",
    "tokenChecker" : "USER",
            
    "request": [
        {"name":"id", "type":"int", "must":true, "min":0, "comment":"服务id"}
    ],

    "process" : [{
        "name" : "update_start_time",
        "type" : "rdb",
        "db": "member",
        "sqls" : [
            {
                "expect":{"num":1,"errorCode":"NO_RIGHT","errorInfo":"no rights"},
                "sql":"update suppliers set start=@{NOW|unit60000}
                    where service=@{id} and account='@{#tokenAcc}' and start=0"
            },
            "update services set state='DOING' where id=@{id} and state<>'OK'"
        ]
    }]
},
{
    "name": "finish",
    "method":"PUT",
    "property" : "private",
    "tokenChecker" : "USER",

    "request": [
        {"name":"id", "type":"int", "must":true, "min":0, "comment":"服务id"}
    ],

    "process" : [{
        "name" : "update_end_time",
        "type" : "rdb",
        "db": "member",
        "sqls" : [
            {
                "expect":{"num":1,"errorCode":"NO_RIGHT","errorInfo":"no rights"},
                "sql":"update suppliers set end=@{NOW|unit60000}
                    where service=@{id} and account='@{#tokenAcc}' and start>0 and end=0"
            },
            {
                "name":"judge_end",
                "multi":false,
                "metas":"each",
                "merge":true,
                "sql":"select count(*) notEndNum from suppliers
                    where service=@{id} and end<=0"
            },
            {
                //所有服务人员都完成才能END，END状态在confirm时会判断
                "when":"@[CONDITION|!notEndNum,'i.==', 0]",
                "sql":"update services set state='END' where id=@{id}"
            }
        ]
    }],
	"response":[]
},
{
    "name": "addComment",
    "method":"POST",
    "property" : "private",
    "tokenChecker" : "USER",
    "tokenChecker": "USER",
    "aclChecker": "RBAC",
    "feature":"write",
    
    "request": [
        {"name":"service", "type":"int", "must":true, "min":0, "comment":"服务id"},
        {"name":"level", "type":"int", "must":true, "min":0, "comment":"满意度等级"},
        {"name":"cmt", "type":"string", "must":true, "min":1, "comment":"评价内容"}
    ],

    "process" : [{
        "name" : "save_comment",
        "type" : "rdb",
        "db": "member",
        "sqls" : [
            "replace into comments(service,at,level,cmt)
             values(@{service},@{#reqAt},@{level},'@{cmt}')"
        ]
    }],
    "response":[]
},
{
    "name": "rmvComment",
    "method":"DELETE",
    "property" : "private",
    "tokenChecker" : "USER",
    "tokenChecker": "USER",
    "aclChecker": "RBAC",
    "feature":"write",
    
    "request": [
        {"name":"service", "type":"int", "must":true, "min":0, "comment":"服务id"},
        {"name":"at", "type":"long", "must":true, "min":1, "comment":"评价时间"}
    ],

    "process" : [{
        "name" : "rmv_comment",
        "type" : "rdb",
        "db": "member",
        "sqls" : [
            "delete from comments
             where service=@{service} and at=@{at}"
        ]
    }],
    "response":[]
},
{
    "name":"comments", //某个服务单的评价
    "method":"GET",
    "property": "private",
    "tokenChecker": "USER",
    "aclChecker": "RoAAC",
    "feature":"read",

    "request": [
        {"name":"service", "type":"int", "must":true, "min":0, "comment":"服务id"}
    ],

    "aclProcess" : [{
        "name":"judge_supplier",
        "type":"dataexists",
        "db":"member",
        "expect":true,
        "sql": "select 1 from services where id=@{service} and supplier='@{#tokenAcc}'"
    }],

    "process" : [{
        "name" : "list_comments",
        "type" : "rdb",
        "db": "member",
        "sqls" : [{
            "name":"list",
            "metas":"each",
            "multi":true,
            "sql":"select at,level,cmt from comments where service=@{service}
              order by at desc"
        }]
    }]
},
{
    "name":"workerCmts", //针对某个员工的所有评价
    "method":"GET",
    "property": "private",
    "tokenChecker": "USER",
    "aclChecker": "RBAC",
    "feature":"read",

    "request": [
        {"name":"supplier", "type":"string", "must":true, "min":1, "comment":"服务人员帐号"},
        {"name":"from", "type":"int", "must":true, "min":0, "comment":"开始时间(包括)，UTC分钟"},
        {"name":"to", "type":"int", "must":true, "min":0, "comment":"结束时间(包括)，UTC分钟"},
        {"name":"offset", "type":"int", "min":0, "default":0},
        {"name":"num", "type":"int", "min":5, "default":20}
    ],

    "vars": [
        {"name":"start", "val":"@{MULTI|l,from,60000}"},
        {"name":"end", "val":"@{MULTI|l,to,60000}"}
    ],
    
    "process" : [{
        "name" : "list_comments",
        "type" : "rdb",
        "db": "member",
        "sqls" : [
            {
                "name":"list",
                "metas":"each",
                "multi":true,
                "sql":"select c.at,c.cmt,c.level,v.name,v.code
                    from suppliers s,comments c,services ss,vips v
                   where s.account='@{supplier}'
                     and c.service=s.service
                     and c.at>@{start} and c.at<@{end}
                     and ss.id=s.service
                     and v.id=ss.vip
                   order by s.start desc
                   LIMIT @{num} OFFSET @{offset}"
            },
            {
                "name":"total",
                "metas":"each",
                "multi":false,
                "merge":true,
                "sql":"select count(*) total from suppliers s,comments c
                    where s.account='@{supplier}'
                     and c.service=s.service
                     and c.at>@{start} and c.at<@{end}"
            }
        ]
    }]
}
]