[
{
    "name" : "__initseqid",
    "method" : "GET",
    "property" : "private",
    "tokenChecker" : "INIT",
    "comment" : "初始化序列号。两个下划线开头的接口，在单例环境中启动时会自动调用",

    "process" : [
        {
            "name" : "init_sequences",
            "type" : "call",
            "service" : "seqid",
            "method" : "POST",
            "url" : "/inits",
            "tokenSign" : "APP",
            "comment" : "初始化序列号",
            "parameters":"{
                \"ids\":[
                    {\"name\":\"serviceid\",\"begin\":1}, //消费记录的序列号
                    {\"name\":\"orderid\",\"begin\":1},
                    {\"name\":\"vipid\",\"begin\":1}
                ]
            }"
        },
        
        {
            "name" : "init_configs",
            "type" : "call",
            "service" : "config",
            "method" : "PUT",
            "url" : "/putsIfAbsent",
            "tokenSign" : "APP",
            "comment" : "初始化不存在的配置项",
            "parameters" : "{\"items\":[
                {\"k\":\"order_ratio\",\"v\":\"0.05\"},
                {\"k\":\"service_ratio\",\"v\":\"0.40\"},
                {\"k\":\"vip_template\",\"v\":\"\"}
            ]}"
        },

        {
            "name" : "init_user_tmpl",
            "type" : "call",
            "service" : "user",
            "method" : "PUT",
            "url" : "/user/initAppExtTmpl",
            "tokenSign" : "APP",
            "comment" : "初始化用户扩展信息模板",
            "parameters" : {"tmpl":
                "{\"service_ratio\":{\"n\":\"服务提成\",\"t\":\"n\"},\"order_ratio\":{\"n\":\"订单提成\",\"t\":\"n\"}}"
            }
        }
    ],
    "response":[]
}
]