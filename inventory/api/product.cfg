[
{
    "name": "list",
    "method": "GET",
    "property": "private",
    "tokenChecker": "USER",
    "aclChecker":"RBAC",
    "feature":"admin,purchaser",
    "request": [
        {"name":"page", "type":"int", "must":true},
        {"name":"pageSize", "type":"int", "must":false, "default":20}
    ],
    "process": [
        {
            "name": "get_products",
            "type": "rdb",
            "db": "inventory",
            "sqls": [
                {
                    "name": "total",
                    "multi": false,
                    "merge": true,
                    "metas": "each",
                    "sql": "select count(*) as total from products"
                },
                {
                    "name": "list",
                    "multi": true,
                    "metas": "each",
                    "sql": "select p.id,p.name,c.id categoryId,c.name as categoryName,p.price,p.costPrice,p.stock,p.minStock,p.unit,s.id supplierId,s.name as supplierName,p.remark
                     from products p
                     left join categories c on p.category=c.id
                     left join suppliers s on p.supplier=s.id
                     order by p.id desc
                     limit @{pageSize} offset @{CALCULATE|i,(page-1)*pageSize}"
                }
            ]
        }
    ],
    "response": [
        {"name":"total", "type":"int"},
        {"name":"list", "type":"object", "list":true, "props":[
            {"name":"id", "type":"int"},
            {"name":"name", "type":"string"},
            {"name":"categoryId", "type":"int"},
            {"name":"categoryName", "type":"string"},
            {"name":"price", "type":"float"},
            {"name":"costPrice", "type":"float"},
            {"name":"stock", "type":"int"},
            {"name":"minStock", "type":"int"},
            {"name":"unit", "type":"string"},
            {"name":"supplierId", "type":"int"},
            {"name":"supplierName", "type":"string"},
            {"name":"remark", "type":"string"}
        ]}
    ]
},

{
    "name": "listById",
    "method": "GET",
    "property": "private",
    "tokenChecker": "USER",
    "aclChecker":"RBAC",
    "feature":"admin,purchaser",
    "request": [
        {"name":"ids", "type":"int", "must":true, "list":true, "minSize":1}
    ],
    "process": [
        {
            "name": "get_products",
            "type": "rdb",
            "db": "inventory",
            "sqls": [{
                "name": "list",
                "multi": true,
                "metas": "each",
                "sql": "select p.id,p.name,c.id categoryId,c.name as categoryName,p.price,p.costPrice,p.stock,p.minStock,p.unit,s.id supplierId,s.name as supplierName,p.remark
                  from products p
                  left join categories c on p.category=c.id
                  left join suppliers s on p.supplier=s.id
                  where p.id in(@{LIST|ids,``}) order by p.createAt desc"
            }]
        }
    ],
    "response": [
        {"name":"total", "type":"int"},
        {"name":"list", "type":"object", "list":true, "props":[
            {"name":"id", "type":"int"},
            {"name":"name", "type":"string"},
            {"name":"categoryId", "type":"int"},
            {"name":"categoryName", "type":"string"},
            {"name":"price", "type":"float"},
            {"name":"costPrice", "type":"float"},
            {"name":"stock", "type":"int"},
            {"name":"minStock", "type":"int"},
            {"name":"unit", "type":"string"},
            {"name":"supplierId", "type":"int"},
            {"name":"supplierName", "type":"string"},
            {"name":"remark", "type":"string"}
        ]}
    ]
},

{
    "name": "search",
    "method": "GET",
    "property": "private",
    "tokenChecker": "USER",
    "request": [
        {"name":"keyword", "type":"string", "must":true, "min":1}
    ],
    "process": [
        {
            "name": "search_ids",
            "type": "search",
            "db": "inventory",
            "table": "products",
            "action": "get 1000",
            "content": "@{keyword}"
        },
        {
            "name": "get_products",
            "type": "rdb",
            "db": "inventory",
            "sqls": [{
                "name": "list",
                "multi": true,
                "metas": "each",
                "sql": "select p.id,p.name,c.id categoryId,c.name as categoryName,p.price,p.costPrice,
                    p.stock,p.minStock,p.unit,s.id supplierId,s.name as supplierName,p.remark 
                    from products p
                    left join categories c on p.category=c.id
                    left join suppliers s on p.supplier=s.id
                    where p.id in(@{LIST|!search_ids,``})"
            }]
        }
    ],
    "response": [
        {"name":"list", "type":"object", "list":true, "props":[
            {"name":"id", "type":"int"},
            {"name":"name", "type":"string"},
            {"name":"categoryId", "type":"int"},
            {"name":"categoryName", "type":"string"},
            {"name":"price", "type":"float"},
            {"name":"costPrice", "type":"float"},
            {"name":"stock", "type":"int"},
            {"name":"minStock", "type":"int"},
            {"name":"unit", "type":"string"},
            {"name":"supplierId", "type":"int"},
            {"name":"supplierName", "type":"string"},
            {"name":"remark", "type":"string"}
        ]}
    ]
},
{
    "name": "create",
    "method": "POST",
    "property": "private",
    "tokenChecker": "USER",
    "aclChecker":"RBAC",
    "feature": "admin",

    "request": [
        {"name":"name", "type":"string", "must":true},
        {"name":"category", "type":"int", "must":true, "comment":"分类id"},
        {"name":"price", "type":"float", "must":true},
        {"name":"costPrice", "type":"float", "must":true},
        {"name":"stock", "type":"int", "must":true},
        {"name":"minStock", "type":"int", "must":false, "default":10},
        {"name":"unit", "type":"string", "must":false, "default":"件"},
        {"name":"supplier", "type":"int", "must":true, "comment":"供应商id"},
        {"name":"remark", "type":"string", "must":false, "default":""}
    ],

    "vars":[
        {"name":"did", "val":"@{SEQUENCE|i,'product'}"}
    ],

    "process": [
        {
            "name": "insert_product",
            "type": "rdb",
            "db": "inventory",
            "sqls": ["insert into products(id,createAt,name,category,price,costPrice,stock,minStock,unit,supplier,remark)
             values(@{did},@{NOW|unit60000},'@{name}',@{category},@{price},@{costPrice},@{stock},@{minStock},'@{unit}',@{supplier},'@{remark}')"]
        },
        {
            "name": "create_search_index",
            "type": "search",
            "db": "inventory",
            "action": "put",
            "table": "products",
            "did": "@{did}",
            "title": "@{name}",
            "content": "@{remark}"
        }
    ],
    "response": []
},
{
    "name": "update",
    "method": "PUT",
    "property": "private",
    "tokenChecker": "USER",
    "aclChecker":"RBAC",
    "feature": "admin,purchaser",
    
    "request": [
        {"name":"id", "type":"int", "must":true},
        {"name":"name", "type":"string", "must":true},
        {"name":"category", "type":"int", "must":true},
        {"name":"price", "type":"float", "must":true},
        {"name":"costPrice", "type":"float", "must":true},
        {"name":"stock", "type":"int", "must":true},
        {"name":"minStock", "type":"int", "must":false, "default":10},
        {"name":"unit", "type":"string", "must":false, "default":"件"},
        {"name":"supplier", "type":"int", "must":true},
        {"name":"remark", "type":"string", "must":false, "default":""}
    ],
    "process": [
        {
            "name": "update_product",
            "type": "rdb",
            "db": "inventory",
            "sqls": ["update products set name='@{name}',
                category=@{category},price=@{price},costPrice=@{costPrice},stock=@{stock},minStock=@{minStock},unit='@{unit}',supplier=@{supplier},remark='@{remark}'
                where id=@{id}"]
        },
        {
            "name": "search_update",
            "type": "search",
            "db": "inventory",
            "action": "update",
            "table": "products",
            "did": "@{id}",
            "title": "@{name}",
            "content": "@{remark}"
        }
    ],
    "response": []
},
{
    "name": "delete",
    "method": "DELETE",
    "property": "private",
    "tokenChecker": "USER",
    "aclChecker":"RBAC",
    "feature": "admin",

    "request": [
        {"name":"id", "type":"int", "must":true}
    ],

    "process": [
        {
            "name": "delete_product",
            "type": "rdb",
            "db": "inventory",
            "sqls": ["delete from products where id=@{id}"]
        },
        {
            "name": "delete_search_index",
            "type": "search",
            "db": "inventory",
            "action": "rmv",
            "table": "products",
            "did": "@{id}"
        }
    ],
    "response": []
},
{
    "name": "get",
    "method": "GET",
    "property": "private",
    "tokenChecker": "USER",

    "request": [
        {"name":"id", "type":"int", "must":true}
    ],

    "process": [{
        "name": "query",
        "type": "rdb",
        "db": "inventory",
        "sqls": [{
            "name": "product",
            "multi": false,
            "merge": true,
            "metas": "each",
            "sql": "select p.id,p.name,c.name as categoryName,p.price,p.costPrice,p.stock,p.minStock,p.unit,s.name as supplierName,p.remark
                from products p
                left join categories c on p.category=c.id
                left join suppliers s on p.supplier=s.id
                where p.id=@{id}"
        }]
    }],
    "response": [
        {"name":"id", "type":"int"},
        {"name":"name", "type":"string"},
        {"name":"categoryName", "type":"string"},
        {"name":"price", "type":"float"},
        {"name":"costPrice", "type":"float"},
        {"name":"stock", "type":"int"},
        {"name":"minStock", "type":"int"},
        {"name":"unit", "type":"string"},
        {"name":"supplierName", "type":"string"},
        {"name":"remark", "type":"string"}
    ]
}
]
