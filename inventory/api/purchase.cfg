[
{
    "name": "createOrder",
    "method": "POST",
    "property": "private",
    "tokenChecker": "USER",
    "request": [
        {"name":"supplierId", "type":"int", "must":true},
        {"name":"remark", "type":"string", "must":true, "default":""}
    ],

    "vars":[
        {"name":"id", "val":"@{SEQUENCE|i,'purchase'}", "toResp":true}
    ],

    "process": [
        {
            "name": "get_supplier_name", //查询名称的同时确认是否真实存在
            "type": "rdb",
            "db": "inventory",
            "sqls": [{
                "name": "get_supplier_name",
                "multi": false,
                "metas": "each",
                "merge": true,
                "sql": "select name from suppliers where id=@{supplierId}"
            }]
        },
        {
            "name": "insert_purchase_order",
            "type": "rdb",
            "db": "log",
            "sqls": [
                "insert into purchase_orders(id,createAt,supplierId,supplierName,creator,remark)
                 values(@{id},@{NOW},@{supplierId},'@{!name}','@{#tokenAcc}','@{remark}')"
            ]
        }
    ],

    "response": [
        {"name":"id", "type":"int"}
    ]
},

{
    "name": "setSupplier",
    "method": "PUT",
    "property": "private",
    "tokenChecker": "USER",
    "request": [
        {"name":"id", "type":"int", "must":true},
        {"name":"supplierId", "type":"int", "must":true},
        {"name":"supplierName", "type":"string", "must":true}
        
    ],

    "process": [{
        "name": "set_customer",
        "type": "rdb",
        "db": "log",
        "sqls": [
            "update purchase_orders set supplierId=@{supplierId},supplierName='@{supplierName}' where id=@{id}"
        ]
    }],
 
    "response": []
},

{
    "name": "addItem",
    "method": "POST",
    "property": "private",
    "tokenChecker": "USER",
    "request": [
        {"name":"orderId", "type":"int", "must":true},
        {"name":"productId", "type":"int", "must":true},
        {"name":"quantity", "type":"int", "must":true},
        {"name":"unitPrice", "type":"float", "must":true}
    ],
    
    "vars":[
        {"name":"subTotal", "val":"@{MULTI|f, quantity, unitPrice}"}
    ],

    "process": [
        {
            "name": "get_product_name", //查询的同时，确认产品是否真实存在
            "type": "rdb",
            "db": "inventory",
            "expect" : true,
            "sqls":[{
                "name":"get_product_name",
                "metas":"each",
                "multi":false,
                "merge":true,
                "sql":"select name from products where id=@{productId}"
            }]
        },

        {
            "name": "insert_purchase_item",
            "type": "rdb",
            "db": "log",
            "sqls": [
               "insert into purchase_items(orderId,productId,productName,quantity,unitPrice,subTotal)
                values(@{orderId},@{productId},'@{!name}',@{quantity},@{unitPrice},@{subTotal})",
               "update purchase_orders set totalAmount=totalAmount+@{subTotal} where id=@{orderId}"
            ]
        }
    ],

    "response": []
},

{
    "name": "removeItem",
    "method": "DELETE",
    "property": "private",
    "tokenChecker": "USER",
    "request": [
        {"name":"orderId", "type":"int", "must":true},
        {"name":"productId", "type":"int", "must":true}
    ],

    "process": [{
        "name": "remove_item",
        "type": "rdb",
        "db": "log",
        "sqls": [
            {
                "name":"subTotal",
                "metas":"each",
                "multi":false,
                "merge":true,
                "sql":"select subTotal from purchase_items where orderId=@{orderId} and productId=@{productId}"
            },
            "delete from purchase_items where orderId=@{orderId} and productId=@{productId}",
            "update purchase_orders set totalAmount=totalAmount-@[!subTotal] where id=@{orderId}"
        ]
    }],
    
    "response": []
},

{
    "name": "completeOrder",
    "method": "PUT",
    "property": "private",
    "tokenChecker": "USER",
    "request": [
        {"name":"id", "type":"int", "must":true}
    ],
    "vars":[
        {"name":"day", "val":"@{NOW|unit86400000}"}
    ],
    "process": [
        {
            "name": "get_items",
            "type": "rdb",
            "db": "log",
            "sqls": [{
                "name": "items",
                "multi": true,
                "metas": "each",
                "sql": "select productId,quantity,subTotal from purchase_items where orderId=@{id}"
            }]
        },
        {
            "name": "update_product_stock",
            "type": "rdb",
            "db": "inventory",
            "sqls":[
               "rs:@{FOR|!items, `;`, `update products set stock=stock+`, e.quantity, ` where id=`, e.productId}"
            ]
        },
        {
            "name": "update_status",
            "type": "rdb",
            "db": "log",
            "sqls": [
                "update purchase_orders set status=1 where id=@{id}",
                //确认时就按天统计计入报表，避免查询报表时再求和
                "insert or ignore into sales_stats(day,type,productId) values@{FOR|!items, `,`, `(@{day},'PUR',`, e.productId, `)`}",              
                "rs:@{FOR|!items, `;`, `update sales_stats set amount=amount+`, e.subTotal, ` where day=@{day} and type='PUR' and productId=`, e.productId}"
            ]
        }
    ],
    "response": []
},

{
    "name": "cancelOrder",
    "method": "DELETE",
    "property": "private",
    "tokenChecker": "USER",
    
    "request": [
        {"name":"id", "type":"int", "must":true}
    ],
    
    "process": [{
        "name": "delete_order_and_items",
        "type": "rdb",
        "db": "log",
        "sqls":[
            {
                "name":"rmv_order",
                "sql":"delete from purchase_orders where id=@{id} and status=0"
            },
            {
                "name":"remove_items",
                "when":"@[CONDITION|!rmv_order_result, 'i.>', 0]",
                "sql":"delete from purchase_items where orderId=@{id}"
            }
        ]
    }],
    "response": []
},

{
    "name": "listOrders",
    "method": "GET",
    "property": "private",
    "tokenChecker": "USER",
    "request": [
        {"name":"status", "type":"int", "must":false},
        {"name":"page", "type":"int", "must":true, "default":1},
        {"name":"pageSize", "type":"int", "must":true, "default":20}
    ],
    "process": [
        {
            "name": "get_orders",
            "type": "rdb",
            "db": "log",
            "sqls": [
                {
                    "name": "total",
                    "multi": false,
                    "merge": true,
                    "metas": "each",
                    "sql": "select count(*) as total from purchase_orders @{IFVALID|status, 'where status=',status}"
                },
                {
                    "name": "list",
                    "multi": true,
                    "metas": "each",
                    "sql": "select id,supplierName,totalAmount,status,createAt,creator
                       from purchase_orders
                      @{IFVALID|status, 'where status=',status}
                      order by id desc
                      limit @{pageSize} offset @{CALCULATE|i,(page-1)*pageSize}"
                }
            ]
        }
    ],
    "response": [
        {"name":"total", "type":"int"},
        {"name":"list", "type":"object", "list":true, "props":[
            {"name":"id", "type":"int"},
            {"name":"supplierName", "type":"string"},
            {"name":"totalAmount", "type":"float"},
            {"name":"status", "type":"int"},
            {"name":"createAt", "type":"long"},
            {"name":"creator", "type":"string"}
        ]}
    ]
},
{
    "name": "getOrder",
    "method": "GET",
    "property": "private",
    "tokenChecker": "USER",
    "request": [
        {"name":"id", "type":"int", "must":true}
    ],
    "process": [
        {
            "name": "get_order_info",
            "type": "rdb",
            "db": "log",
            "sqls": [
                {
                    "name": "order",
                    "multi": false,
                    "merge": true,
                    "metas": "each",
                    "sql": "select id,supplierId,supplierName,totalAmount,status,createAt,creator,remark
                        from purchase_orders where id=@{id}"
                },
                {
                    "name": "items",
                    "multi": true,
                    "metas": "each",
                    "sql": "select productId,productName,quantity,unitPrice,subTotal
                        from purchase_items where orderId=@{id}"
                }
            ]
        }
    ],
    "response": [
        {"name":"id", "type":"int"},
        {"name":"supplierId", "type":"int"},
        {"name":"supplierName", "type":"string"},
        {"name":"totalAmount", "type":"float"},
        {"name":"status", "type":"int"},
        {"name":"createAt", "type":"long"},
        {"name":"creator", "type":"string"},
        {"name":"remark", "type":"string"},
        {"name":"items", "type":"object", "list":true, "props":[
            {"name":"productId", "type":"int"},
            {"name":"productName", "type":"string"},
            {"name":"quantity", "type":"int"},
            {"name":"unitPrice", "type":"float"},
            {"name":"subTotal", "type":"float"}
        ]}
    ]
}
]
