[
{
    "name": "list",
    "method": "GET",
    "property": "private",
    "tokenChecker": "USER",
    "aclChecker":"RBAC",
    "feature":"admin",
    "request": [
        {"name":"page", "type":"int", "must":true, "min":1},
        {"name":"pageSize", "type":"int", "must":false, "default":20}
    ],

    "process": [{
        "name": "get_categories",
        "type": "rdb",
        "db": "inventory",
        "sqls": [
            {
                "name": "total",
                "multi": false,
                "merge": true,
                "metas": "each",
                "sql": "select count(*) as total from categories"
            },
            {
                "name": "list",
                "multi": true,
                "metas": "each",
                "sql": "select id,name,remark from categories
                   order by id desc
                   limit @{pageSize} offset @{CALCULATE|i,(page-1)*pageSize}"
            }
        ]
    }],
    "response": [
        {"name":"total", "type":"int"},
        {"name":"list", "type":"object", "list":true, "props":[
            {"name":"id", "type":"int"},
            {"name":"name", "type":"string"},
            {"name":"remark", "type":"string"}
        ]}
    ]
},
{
    "name": "search",
    "method": "GET",
    "property": "private",
    "tokenChecker": "USER",
    "aclChecker":"RBAC",
    "feature":"admin",
    "request": [
        {"name":"keyword", "type":"string", "must":true, "min":1}
    ],
    "process": [
        {
            "name": "search_ids",
            "type": "search",
            "db": "inventory",
            "table": "categories",
            "action": "get 100",
            "content": "@{keyword}"
        },
        {
            "name": "get_categories",
            "type": "rdb",
            "db": "inventory",
            "sqls": [{
                "name": "list",
                "multi": true,
                "metas": "each",
                "sql": "select id,name,remark from categories where id in(@{LIST|!search_ids,``})"
            }]
        }
    ],
    "response": [
        {"name":"list", "type":"object", "list":true, "props":[
            {"name":"id", "type":"int"},
            {"name":"name", "type":"string"},
            {"name":"remark", "type":"string"}
        ]}
    ]
},
{
    "name": "create",
    "method": "POST",
    "property": "private",
    "tokenChecker": "USER",
    "aclChecker":"RBAC",
    "feature": "admin",
    
    "request": [
        {"name":"name", "type":"string", "must":true},
        {"name":"remark", "type":"string", "must":false, "default":""}
    ],

    "vars":[
        {"name":"id", "val":"@{SEQUENCE|i,'category'}"}
    ],

    "process": [
        {
            "name": "insert_category",
            "type": "rdb",
            "db": "inventory",
            "sqls": ["insert into categories(id,createAt,name,remark)
             values(@{id},@{NOW|unit60000},'@{name}','@{remark}')"]
        },
        {
            "name": "create_search_index",
            "type": "search",
            "db": "inventory",
            "action": "put",
            "table": "categories",
            "did": "@{id}",
            "title": "@{name}",
            "content": "@{remark}"
        }
    ],
    "response": []
},
{
    "name": "update",
    "method": "PUT",
    "property": "private",
    "tokenChecker": "USER",
    "aclChecker":"RBAC",
    "feature": "admin",
    
    "request": [
        {"name":"id", "type":"int", "must":true},
        {"name":"name", "type":"string", "must":true},
        {"name":"remark", "type":"string", "must":false, "default":""}
    ],
    "process": [
        {
            "name": "update_category",
            "type": "rdb",
            "db": "inventory",
            "sqls": ["update categories set name='@{name}',remark='@{remark}' where id=@{id}"]
        },
        {
            "name": "update_search_index",
            "type": "search",
            "db": "inventory",
            "action": "update",
            "table": "categories",
            "did": "@{id}",
            "title": "@{name}",
            "content": "@{remark}"
        }
    ],
    "response": []
},
{
    "name": "delete",
    "method": "DELETE",
    "property": "private",
    "tokenChecker": "USER",
    "aclChecker":"RBAC",
    "feature": "admin",

    "request": [
        {"name":"id", "type":"int", "must":true}
    ],

    "process": [
        {
            "name": "delete_category",
            "type": "rdb",
            "db": "inventory",
            "sqls": ["delete from categories where id=@{id}"]
        },
        {
            "name": "delete_search_index",
            "type": "search",
            "db": "inventory",
            "action": "rmv",
            "table": "categories",
            "did": "@{id}"
        }
    ],
    "response": []
}
]
