[
{
    "name": "stats",
    "method": "GET",
    "property": "private",
    "tokenChecker": "USER",
    
    "request": [
        {"name":"startDate", "type":"long", "must":true, "min":0},
        {"name":"endDate", "type":"long", "must":true, "biggerThan":"startDate"}
    ],
    
    "process": [
        {
            "name": "inventory_stats",
            "type": "rdb",
            "db": "inventory",
            "sqls": [
                {
                    "name":"product_count",
                    "multi":false,
                    "merge":true,
                    "metas":"each",
                    "sql":"select count(*) as productCount from products"
                },
                {
                    "name":"low_stock",
                    "multi":false,
                    "merge":true,
                    "metas":"each",
                    "sql":"select count(*) as lowStockCount from products where stock<=minStock"
                },
                {
                    "name":"supplier_count",
                    "multi":false,
                    "merge":true,
                    "metas":"each",
                    "sql":"select count(*) as supplierCount from suppliers"
                },
                {
                    "name":"customer_count",
                    "multi":false,
                    "merge":true,
                    "metas":"each",
                    "sql":"select count(*) as customerCount from customers"
                }
            ]
        },
        {
            "name": "log_stats",
            "type": "rdb",
            "db": "log",
            "sqls": [
                {
                    "name":"today_sales",
                    "multi":false,
                    "merge":true,
                    "metas":"each",
                    "sql":"select COALESCE(sum(finalAmount),0) as todaySales from sales_orders
                        where status=1 and createAt>@{NOW|daystart} and createAt<@{#reqAt}"
                },
                {
                    "name":"month_sales",
                    "multi":false,
                    "merge":true,
                    "metas":"each",
                    "sql":"select COALESCE(sum(finalAmount),0) as monthSales from sales_orders
                        where status=1 and createAt>=@{startDate} and createAt<=@{endDate}"
                }
            ]
        }
    ],
    "response": [
        {"name":"productCount", "type":"int"},
        {"name":"supplierCount", "type":"int"},
        {"name":"customerCount", "type":"int"},
        {"name":"todaySales", "type":"float"},
        {"name":"monthSales", "type":"float"},
        {"name":"lowStockCount", "type":"int"}
    ]
},
{
    "name": "salesTrend",
    "method": "GET",
    "property": "private",
    "tokenChecker": "USER",
    "aclChecker":"RBAC",
    "feature":"admin",
    "request": [
        {"name":"startDate", "type":"long", "min":0, "must":true},
        {"name":"endDate", "type":"long", "biggerThan":"startDate", "must":true}
    ],
    
    "vars": [
        {"name":"start", "val":"@{UTC|startDate,0,unit86400000}"},
        {"name":"end", "val":"@{UTC|endDate,0,unit86400000}"}
    ],
    
    "process": [
        {
            "name": "trend",
            "type": "rdb",
            "db": "log",
            "sqls": [{
                "name": "data",
                "multi": true,
                "metas": "each",
                "sql": "select day,type,amount from sales_stats
                   where day>@{SUB|i,start,1} and day<@{ADD|i,end,1} order by day"
            }]
        }
    ],
    "response": [
        {"name":"data", "type":"object", "list":true, "props":[
            {"name":"day", "type":"int"},
            {"name":"type", "type":"string"},
            {"name":"amount", "type":"float"}
        ]}
    ]
},
{
    "name": "topProducts",
    "method": "GET",
    "property": "private",
    "tokenChecker": "USER",
    "aclChecker":"RBAC",
    "feature":"admin",

    "request": [
        {"name":"limit", "type":"int", "must":false, "default":10},
        {"name":"startDate", "type":"long", "must":true, "min":0},
        {"name":"endDate", "type":"long", "must":true, "biggerThan":"startDate"}
    ],
    
    "process": [
        {
            "name": "get_top_products",
            "type": "rdb",
            "db": "log",
            "sqls": [{
                "name": "list",
                "multi": true,
                "metas": "each",
                "sql": "select si.productId,si.productName name,sum(si.quantity) as totalQty,sum(si.subTotal) as totalAmount
                     from sales_items si, sales_orders so
                    where so.status=1 and so.createAt>@{SUB|l,startDate,1} and so.createAt<@{endDate}
                          and si.orderId=so.id
                    group by productId
                    order by totalQty desc
                    limit @{limit}"
            }]
        }
    ],
    "response": [
        {"name":"list", "type":"object", "list":true, "props":[
            {"name":"productId", "type":"int"},
            {"name":"name", "type":"string"},
            {"name":"totalQty", "type":"int"},
            {"name":"totalAmount", "type":"float"}
        ]}
    ]
}
]
