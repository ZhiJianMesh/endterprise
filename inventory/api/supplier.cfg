[
{
    "name": "list",
    "method": "GET",
    "property": "private",
    "tokenChecker": "USER",
    "aclChecker":"RBAC",
    "feature":"admin,purchaser",
    "request": [
        {"name":"page", "type":"int", "must":true},
        {"name":"pageSize", "type":"int", "must":false, "default":20}
    ],

    "process": [
        {
            "name": "get_suppliers",
            "type": "rdb",
            "db": "inventory",
            "sqls": [
                {
                    "name": "total",
                    "multi": false,
                    "merge": true,
                    "metas": "each",
                    "sql": "select count(*) as total from suppliers"
                },
                {
                    "name": "list",
                    "multi": true,
                    "metas": "each",
                    "sql": "select id,name,contact,phone,address,remark
                       from suppliers
                      order by id desc
                      limit @{pageSize} offset @{CALCULATE|i,(page-1)*pageSize}"
                }
            ]
        }
    ],
    "response": [
        {"name":"total", "type":"int"},
        {"name":"list", "type":"object", "list":true, "props":[
            {"name":"id", "type":"int"},
            {"name":"name", "type":"string"},
            {"name":"contact", "type":"string"},
            {"name":"phone", "type":"string"},
            {"name":"address", "type":"string"},
            {"name":"remark", "type":"string"}
        ]}
    ]
},
{
    "name": "search",
    "method": "GET",
    "property": "private",
    "tokenChecker": "USER",
    "aclChecker":"RBAC",
    "feature":"admin,purchaser",
    "request": [
        {"name":"keyword", "type":"string", "must":true}
    ],
    "process": [
        {
            "name": "search_ids",
            "type": "search",
            "db": "inventory",
            "table": "suppliers",
            "action": "get 100",
            "content": "@{keyword}"
        },
        {
            "name": "get_suppliers",
            "type": "rdb",
            "db": "inventory",
            "sqls": [{
                "name": "list",
                "multi": true,
                "metas": "each",
                "sql": "select id,name,contact,phone,address,remark
                    from suppliers where id in(@{LIST|!search_ids,``})"
            }]
        }
    ],
    "response": [
        {"name":"list", "type":"object", "list":true, "props":[
            {"name":"id", "type":"int"},
            {"name":"name", "type":"string"},
            {"name":"contact", "type":"string"},
            {"name":"phone", "type":"string"},
            {"name":"address", "type":"string"},
            {"name":"remark", "type":"string"}
        ]}
    ]
},
{
    "name": "create",
    "method": "POST",
    "property": "private",
    "tokenChecker": "USER",
    "aclChecker":"RBAC",
    "feature":"admin,purchaser",
    "request": [
        {"name":"name", "type":"string", "must":true},
        {"name":"contact", "type":"string", "must":true, "default":""},
        {"name":"phone", "type":"string", "must":true, "default":""},
        {"name":"address", "type":"string", "must":true, "default":""},
        {"name":"remark", "type":"string", "must":true, "default":""}
    ],

    "vars":[
        {"name":"id", "val":"@{SEQUENCE|i,'supplier'}", "toResp":true}
    ],

    "process": [
        {
            "name": "insert_supplier",
            "type": "rdb",
            "db": "inventory",
            "sqls": [
                "insert into suppliers(id,createAt,name,contact,phone,address,remark)
                values(@{id},@{NOW|unit60000},'@{name}','@{contact}','@{phone}','@{address}','@{remark}')"
        	    ]
        },
        {
            "name": "create_search_index",
            "type": "search",
            "db": "inventory",
            "action": "put",
            "table": "suppliers",
            "did": "@{id}",
            "title": "@{name}",
            "summary": "@{contact} @{phone}",
            "content": "@{address} @{remark}"
        }
    ],
    "response": [
        {"name":"id", "type":"int"}
    ]
},
{
    "name": "update",
    "method": "POST",
    "property": "private",
    "tokenChecker": "USER",
    "aclChecker":"RBAC",
    "feature":"admin,purchaser",
    "request": [
        {"name":"id", "type":"int", "must":true},
        {"name":"name", "type":"string", "must":true},
        {"name":"contact", "type":"string", "must":false, "default":""},
        {"name":"phone", "type":"string", "must":false, "default":""},
        {"name":"address", "type":"string", "must":false, "default":""},
        {"name":"remark", "type":"string", "must":false, "default":""}
    ],
    "process": [
        {
            "name": "update_supplier",
            "type": "rdb",
            "db": "inventory",
            "sqls": ["update suppliers set name='@{name}',contact='@{contact}',phone='@{phone}',address='@{address}',remark='@{remark}' where id=@{id}"]
        },
        {
            "name": "update_search_index",
            "type": "search",
            "db": "inventory",
            "action": "update",
            "table": "suppliers",
            "did": "@{id}",
            "title": "@{name}",
            "summary": "@{contact} @{phone}",
            "content": "@{address} @{remark}"
        }
    ],
    "response": []
},
{
    "name": "delete",
    "method": "DELETE",
    "property": "private",
    "tokenChecker": "USER",
    "aclChecker":"RBAC",
    "feature":"admin,purchaser",
    "request": [
        {"name":"id", "type":"int", "must":true, "min":1}
    ],
    "process": [
        {
            "name": "judge_not_used",
            "type": "dataexists",
            "db": "inventory",
            "expect": false, //如果存在，返回20001
            "errorCode": "20001",
            "errorInfo": "used by products",
            "sql": "select * from products where supplier=@{id}"
        },
        {
            "name": "delete_supplier",
            "type": "rdb",
            "db": "inventory",
            "sqls": ["delete from suppliers where id=@{id}"]
        },
        {
            "name": "delete_search_index",
            "type": "search",
            "db": "inventory",
            "action": "rmv",
            "table": "suppliers",
            "did": "@{id}"
        }
    ],
    "response": []
}
]
