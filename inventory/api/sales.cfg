[
{
    "name": "createOrder",
    "method": "POST",
    "property": "private",
    "tokenChecker": "USER",
    "request": [
        {"name":"customerId", "type":"int", "must":false, "default":0, "comment":"不传时，默认0为Unknown"},
        {"name":"discount", "type":"float", "must":false, "default":0},
        {"name":"payMethod", "type":"string", "must":true, "options":["ALP","WX","CAS","OTH"]},
        {"name":"remark", "type":"string", "must":false, "default":""}
    ],

    "vars":[
        {"name":"id", "val":"@{SEQUENCE|i,'sales'}", "toResp":true}
    ],

    "process": [
        {
            "name": "get_customer",
            "type": "rdb",
            "db": "inventory",
            "sqls": [{
                "name": "list",
                "multi": false,
                "merge": true,
                "metas": "each",
                "sql": "select name from customers where id=@{customerId}"
            }]
        },
        {
            "name": "insert_sales_order",
            "type": "rdb",
            "db": "log",
            "sqls": [
                "insert into sales_orders(id,createAt,customerId,customerName,discount,payMethod,creator,remark)
                 values(@{id},@{NOW},@{customerId},'@{!name}',@{discount},'@{payMethod}','@{#tokenAcc}','@{remark}')"                
            ]
        }
    ],
 
    "response": [
        {"name":"id", "type":"int"}
    ]
},

{
    "name": "setCustomer",
    "method": "PUT",
    "property": "private",
    "tokenChecker": "USER",
    "request": [
        {"name":"id", "type":"int", "must":true},
        {"name":"customerId", "type":"int", "must":true},
        {"name":"customerName", "type":"string", "must":true}
        
    ],

    "process": [{
        "name": "set_customer",
        "type": "rdb",
        "db": "log",
        "sqls": [
            "update sales_orders set customerId=@{customerId},customerName='@{customerName}' where id=@{id}"
        ]
    }],
 
    "response": []
},

{
    "name": "addItem",
    "method": "POST",
    "property": "private",
    "tokenChecker": "USER",
    "request": [
        {"name":"orderId", "type":"int", "must":true},
        {"name":"productId", "type":"int", "must":true},
        {"name":"quantity", "type":"int", "must":true, "min":1},
        {"name":"unitPrice", "type":"float", "must":true, "min":0}       
    ],
    
    "vars":[
        {"name":"subTotal", "val":"@{MULTI|f, quantity, unitPrice}"}
    ],
    
    "process": [
        {
            "name": "get_product_name", //查询的同时，确认产品是否真实存在，且足量
            "type": "rdb",
            "db": "inventory",
            "sqls":[{
                "name":"get_product_name",
                "metas":"each",
                "multi":false,
                "merge":true,
                "sql":"select name from products where id=@{productId} and stock>=@{quantity}"
            }]
        },
        {
            "name": "insert_sales_item",
            "type": "rdb",
            "db": "log",
            "sqls": [
                "insert into sales_items(orderId,productId,productName,quantity,unitPrice,subTotal)
                 values(@{orderId},@{productId},'@{!name}',@{quantity},@{unitPrice},@{subTotal})",
                "update sales_orders set totalAmount=totalAmount+@{subTotal} where id=@{orderId}"
            ]
        },

	    {
            "name": "update_product_stock",
            "type": "rdb",
            "db": "inventory",
            "sqls":[
                //销售订单在加入清单时就检查数量是否足够，并扣减
                "update products set stock=stock-@{quantity} where id=@{productId}"
            ]
        }
    ],
    "response": []
},

{
    "name": "removeItem",
    "method": "DELETE",
    "property": "private",
    "tokenChecker": "USER",
    "request": [
        {"name":"orderId", "type":"int", "must":true},
        {"name":"productId", "type":"int", "must":true}
    ],

    "process": [
        {
            "name": "get_product_quantity",
            "type": "rdb",
            "db": "log",
            "sqls":[{
                "name":"product",
                "metas":"each",
                "multi":false,
                "merge":true,
                "ignores":["NOT_EXISTS"],
                "sql":"select quantity,subTotal from sales_items where orderId=@{orderId} and productId=@{productId}"
            }]
        },
        {
            "name": "return_product_stock",
            "type": "rdb",
            "when": "@{CONDITION|!quantity, 'i.>', 0}",
            "db": "inventory",
            "sqls":[
                "update products set stock=stock+@{!quantity} where id=@{productId}"
            ]
        },
        {
            "name": "remove_item",
            "type": "rdb",
            "db": "log",
            "sqls": [
                "delete from sales_items where orderId=@{orderId} and productId=@{productId}",
                "update sales_orders set totalAmount=totalAmount-@{!subTotal} where id=@{orderId}",
                //更新折扣价，必须分两次，否则totalAmount用的是原来的值，而不是减去subTotal的值
                "update sales_orders set finalAmount=(1-discount)*totalAmount where id=@{orderId}"
            ]
        }
    ],
    
    "response": []
},

{
    "name": "completeOrder",
    "method": "PUT",
    "property": "private",
    "tokenChecker": "USER",
    "request": [
        {"name":"id", "type":"int", "must":true},
        {"name":"finalAmount", "type":"float", "must":false, "min":0}
    ],

    "vars":[
        {"name":"day", "val":"@{NOW|unit86400000}"}
    ],

    "process": [{
        "name": "update_status",
        "type": "rdb",
        "db": "log",
        "sqls": [
            "update sales_orders set status=1 @{IFVALID|finalAmount, `,finalAmount=`, finalAmount} where id=@{id}",
            {
                "name":"items",
                "metas":"each",
                "multi":true,
                "merge":false,
                "sql":"select productId,subTotal from sales_items where orderId=@{id}"
            },
            //确认时就按天统计计入报表，避免查询报表时再求和
            "insert or ignore into sales_stats(day,type,productId) values@[FOR|!items, `,`, `(@{day},'SAL',`, e.productId, `)`]",              
            "rs:@[FOR|!items, `;`, `update sales_stats set amount=amount+`, e.subTotal, ` where day=@{day} and type='SAL' and productId=`, e.productId]"
        ]
    }],
    "response": []
},

{
    "name": "cancelOrder",
    "method": "DELETE",
    "property": "private",
    "tokenChecker": "USER",
    
    "request": [
        {"name":"id", "type":"int", "must":true}
    ],
    
    "process": [
        {
            "name": "get_sale_itmes",
            "type": "rdb",
            "db": "log",
            "sqls":[{
                "name":"items",
                "metas":"each",
                "multi":true,
                "merge":false,
                "ignores":["NOT_EXISTS"],
                "sql":"select productId,quantity from sales_items where orderId=@{id}"
            }]
        },
        {
            "name": "update_status",
            "type": "rdb",
            "db": "inventory",
            "when": "@{CONDITION|!items, 'size.>', 0}",
            "sqls": [//将订单占用的产品退回
                "rs:@{FOR|!items, `;`, `update products set stock=stock+`, e.quantity, ` where id=`, e.productId}"
            ]
        },
        {
            "name": "delete_order_and_items",
            "type": "rdb",
            "db": "log",
            "sqls":[
                "delete from sales_items where orderId=@{id}",
                "delete from sales_orders where id=@{id}"
            ]
        }
    ],
    "response": []
},

{
    "name": "listOrders",
    "method": "GET",
    "property": "private",
    "tokenChecker": "USER",
    "request": [
        {"name":"status", "type":"int", "must":false},
        {"name":"page", "type":"int", "must":true},
        {"name":"pageSize", "type":"int", "must":false, "default":20}
    ],

    "process": [
        {
            "name": "get_sales_orders",
            "type": "rdb",
            "db": "log",
            "sqls": [
                {
                    "name": "total",
                    "multi": false,
                    "merge": true,
                    "metas": "each",
                    "sql": "select count(*) as total from sales_orders @{IFVALID|status, 'where status=',status}"
                },
                {
                    "name": "list",
                    "multi": true,
                    "metas": "each",
                    "sql": "select id,customerId,customerName,totalAmount,finalAmount,status,createAt,creator
                          from sales_orders 
                         @{IFVALID|status, 'where status=',status}
                         order by id desc
                         limit @{pageSize} offset @{CALCULATE|i,(page-1)*pageSize}"
                }
            ]
        }
    ],
    "response": [
        {"name":"total", "type":"int"},
        {"name":"list", "type":"object", "list":true, "props":[
            {"name":"id", "type":"int"},
            {"name":"customerId", "type":"int"},
            {"name":"customerName", "type":"string"},
            {"name":"totalAmount", "type":"float"},
            {"name":"finalAmount", "type":"float"},
            {"name":"status", "type":"int"},
            {"name":"createAt", "type":"long"},
            {"name":"creator", "type":"string"}
        ]}
    ]
},
{
    "name": "getOrder",
    "method": "GET",
    "property": "private",
    "tokenChecker": "USER",
    "request": [
        {"name":"id", "type":"int", "must":true}
    ],
    "process": [
        {
            "name": "order_items",
            "type": "rdb",
            "db": "log",
            "sqls": [
                {
                    "name": "order",
                    "multi": false,
                    "merge": true,
                    "metas": "each",
                    "sql": "select id,customerId,customerName,totalAmount,discount,finalAmount,
                        payMethod,status,createAt,creator,remark
                        from sales_orders where id=@{id}"
                },
                {
                    "name": "items",
                    "multi": true,
                    "metas": "each",
                    "sql": "select productId,productName,quantity,unitPrice,subTotal
                        from sales_items where orderId=@{id}"
                }
            ]
        }
    ],
    "response": [
        {"name":"id", "type":"int"},
        {"name":"customerId", "type":"int"},
        {"name":"customerName", "type":"string"},
        {"name":"totalAmount", "type":"float"},
        {"name":"discount", "type":"float"},
        {"name":"finalAmount", "type":"float"},
        {"name":"payMethod", "type":"string"},
        {"name":"status", "type":"int"},
        {"name":"createAt", "type":"long"},
        {"name":"creator", "type":"string"},
        {"name":"remark", "type":"string"},
        {"name":"items", "type":"object", "list":true, "props":[
            {"name":"productId", "type":"int"},
            {"name":"productName", "type":"string"},
            {"name":"quantity", "type":"int"},
            {"name":"unitPrice", "type":"float"},
            {"name":"subTotal", "type":"float"}
        ]}
    ]
}
]
