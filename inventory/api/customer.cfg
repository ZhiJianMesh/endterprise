[
{
    "name": "list",
    "method": "GET",
    "property": "private",
    "tokenChecker": "USER",
    "request": [
        {"name":"page", "type":"int", "must":true, "default":1},
        {"name":"pageSize", "type":"int", "must":true, "default":20}
    ],
    "process": [
        {
            "name": "get_customers",
            "type": "rdb",
            "db": "inventory",
            "sqls": [
                {
                    "name": "total",
                    "multi": false,
                    "merge": true,
                    "metas": "each",
                    "sql": "select count(*) as total from customers"
                },
                {
                    "name": "list",
                    "multi": true,
                    "metas": "each",
                    "sql": "select id,name,phone,address,remark from customers order by createAt desc limit @{pageSize} offset @{CALCULATE|i,`(@{page}-1)*@{pageSize}`}"
                }
            ]
        }
    ],
    "response": [
        {"name":"total", "type":"int"},
        {"name":"list", "type":"object", "list":true, "props":[
            {"name":"id", "type":"int"},
            {"name":"name", "type":"string"},
            {"name":"phone", "type":"string"},
            {"name":"address", "type":"string"},
            {"name":"remark", "type":"string"}
        ]}
    ]
},
{
    "name": "search",
    "method": "GET",
    "property": "private",
    "tokenChecker": "USER",
    "request": [
        {"name":"keyword", "type":"string", "must":true, "default":""}
    ],
    "process": [
        {
            "name": "search_ids",
            "type": "search",
            "db": "inventory",
            "table": "customers",
            "action": "get 1000",
            "content": "@{keyword}"
        },
        {
            "name": "get_customers",
            "type": "rdb",
            "db": "inventory",
            "sqls": [{
                "name": "list",
                "multi": true,
                "metas": "each",
                "sql": "select id,name,phone,address,remark from customers
                   where id in(@{LIST|!search_ids,``})"
            }]
        }
    ],
    "response": [
        {"name":"list", "type":"object", "list":true, "props":[
            {"name":"id", "type":"int"},
            {"name":"name", "type":"string"},
            {"name":"phone", "type":"string"},
            {"name":"address", "type":"string"},
            {"name":"remark", "type":"string"}
        ]}
    ]
},

{
    "name": "create",
    "method": "POST",
    "property": "private",
    "tokenChecker": "USER",
    "request": [
        {"name":"name", "type":"string", "must":true},
        {"name":"phone", "type":"string", "must":false, "default":""},
        {"name":"address", "type":"string", "must":false, "default":""},
        {"name":"remark", "type":"string", "must":false, "default":""}
    ],
    
    "vars":[
        {"name":"did", "val":"@{SEQUENCE|i,'customer'}"}
    ],

    "process": [
        {
            "name": "insert_customer",
            "type": "rdb",
            "db": "inventory",
            "sqls": ["insert into customers(id,createAt,name,phone,address,remark)
             values(@{did},@{NOW|unit60000},'@{name}','@{phone}','@{address}','@{remark}')"]
        },
        {
            "name": "create_search_index",
            "type": "search",
            "db": "inventory",
            "action": "put",
            "table": "customers",
            "did": "@{did}",
            "title": "@{name}",
            "summary": "@{phone}",
            "content": "@{address} @{remark}"
        }
    ],
    "response": []
},
{
    "name": "update",
    "method": "PUT",
    "property": "private",
    "tokenChecker": "USER",
    "request": [
        {"name":"id", "type":"int", "must":true},
        {"name":"name", "type":"string", "must":true},
        {"name":"phone", "type":"string", "must":false, "default":""},
        {"name":"address", "type":"string", "must":false, "default":""},
        {"name":"remark", "type":"string", "must":false, "default":""}
    ],
    "process": [
        {
            "name": "update_customer",
            "type": "rdb",
            "db": "inventory",
            "sqls": ["update customers set name='@{name}',
                phone='@{phone}',address='@{address}',remark='@{remark}'
                where id=@{id}"]
        },
        {
            "name": "update_search_index",
            "type": "search",
            "db": "inventory",
            "action": "update",
            "table": "customers",
            "did": "@{id}",
            "title": "@{name}",
            "summary": "@{phone}",
            "content": "@{address} @{remark}"
        }
    ],
    "response": []
},
{
    "name": "delete",
    "method": "DELETE",
    "property": "private",
    "tokenChecker": "USER",
    "request": [
        {"name":"id", "type":"int", "must":true, "min":1}
    ],
    
    "process": [
        {
            "name": "delete_customer",
            "type": "rdb",
            "db": "inventory",
            "sqls": ["delete from customers where id=@{id}"]
        },
        {
            "name": "delete_search_index",
            "type": "search",
            "db": "inventory",
            "action": "rmv",
            "table": "customers",
            "did": "@{id}"
        }
    ],
    "response": []
}
]
