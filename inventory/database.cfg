[
{
"name":"inventory", //资产清单
"type":"rdb",
"version":"0.1.0",
"versions":[
{
    "minVer":"0.0.0",
    "maxVer":"0.1.0",
    "toVer":"0.1.0",
    "sqls":[
        "create table if not exists products (
            id        int not null primary key,
            createAt  int not null, -- UTC分钟
            category  int not null, -- 分类ID
            price     float not null default 0,
            costPrice float not null default 0, -- 成本价
            stock     int not null default 0, -- 当前库存
            minStock  int not null default 10,
            supplier  int not null default 0, -- 供应商id

            name      varchar(255) not null,
            unit      varchar(50) not null default '件',
            remark    text not null default ''
        )",
        "create index if not exists idx_products_category on products(category,stock)",
        "create index if not exists idx_products_supplier on products(supplier)",

        "create table if not exists suppliers (
            id        int not null primary key,
            createAt  int not null, -- UTC分钟
            name      varchar(255) not null,
            contact   varchar(100) not null default '',
            phone     varchar(50) not null default '',
            address   varchar(500) not null default '',
            remark    text not null default ''
        )",
        //零售场景，有时候并不会关心供应商
        "insert or ignore into suppliers(id,createAt,name,phone,address,remark)
         values(0,@{NOW|unit60000},'Unknown','Unknown','Unknown','')",
        
        "create table if not exists customers (
            id        int not null primary key,
            createAt  int not null, -- UTC分钟
            name      varchar(255) not null,
            phone     varchar(50) not null default '',
            address   varchar(500) not null default '',
            remark    text not null default ''
        )",
        //零售场景，绝大部分情况下不关心客户是谁，使用Unknown
        "insert or ignore into customers(id,createAt,name,phone,address,remark)
         values(0,@{NOW|unit60000},'Unknown','Unknown','Unknown','')",
        
        "create table if not exists categories (
            id        int not null primary key,
            createAt  int not null, -- UTC分钟
            name      varchar(100) not null,
            remark    text not null default ''
        )"
    ]
}
]
},

{
    "name":"inventory",
    "type":"sdb"
},

{
"name":"log", //交易记录
"type":"rdb",
"version":"0.1.0",
"versions":[
{
    "minVer":"0.0.0",
    "maxVer":"0.1.0",
    "toVer":"0.1.0",
    "sqls":[
        "create table if not exists purchase_orders (
            id           int not null primary key,
            createAt     bigint(8) not null, -- 创建时间，UTC毫秒
            status       tinyint not null default 0, -- 0未完成，1完成
            totalAmount  float not null default 0, -- 总金额
            supplierId   int not null,  -- 供应商ID
            supplierName varchar(255) not null,
            creator      varchar(255) not null,
            remark       text not null default ''
        )",
        "create index if not exists idx_purchase_supplier on purchase_orders(supplierId)",
        "create index if not exists idx_purchase_status on purchase_orders(status,createAt)",
        
        "create table if not exists purchase_items (
            orderId      int not null,
            productId    int not null,
            quantity     int not null,
            unitPrice    float not null,
            subTotal     float not null,
            productName  varchar(255) not null, -- 冗余字段，避免跨库查询
            
            primary key(orderId, productId)
        )",
        
        "create table if not exists sales_orders (
            id           int not null primary key,
            createAt     bigint(8) not null,
            totalAmount  float not null default 0, -- 总金额，各项的简单求和
            discount     float not null default 0, -- 折扣率，
            finalAmount  float not null default 0, -- 计算了折扣后的金额，也可能手动修改过
            payMethod    char(3) not null, -- 支付方式：ALP支付宝，WX微信，CAS现金，OTH其他
            status       tinyint not null default 0,
            customerId   int not null default 0, -- 0:Unknown
            customerName varchar(255) not null default '', -- 冗余字段
            creator      varchar(255) not null,
            remark       text not null default ''
        )",
        "create index if not exists idx_sales_customer on sales_orders(customerId)",
        "create index if not exists idx_sales_status on sales_orders(status,createAt)",
        
        "create table if not exists sales_items (
            orderId     int not null,
            productId   int not null,
            quantity    int not null,
            unitPrice   float not null,
            subTotal    float not null,
            productName varchar(255) not null,
            
            primary key(orderId, productId)
        )",        
                
        "create table if not exists sales_stats (
            day         int not null, -- UTC天
            type        char(3) not null, -- SAL:sales,PUR:purchase
            productId   int not null,
            amount      double not null default 0,
            
            primary key(day, type, productId)
        )"
    ]
}
]
}
]
