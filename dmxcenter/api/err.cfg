[
{
    "name": "list",
    "method":"GET",
    "property" : "private",
    "tokenChecker":"USER",
    "aclChecker":"RBAC",
    "comment":"查看错误请求",
    
    "request": [
        {"name":"offset", "type":"int", "must":true, "min":0, "comment":"开始"},
        {"name":"num", "type":"int", "must":true, "min":5, "comment":"查询数量"}
    ],

    "process" : [{
        "name" : "get_errreqs",
        "type" : "rdb",
        "db":"device",
        "sqls": [
            {
                "name": "get_total",
                "metas" : "each",
                "multi": false,
                "merge": true,
                "sql":"select count(*) total from errreqs"
            },
            {
                "name": "errs",
                "metas" : "cols",
                "multi": true,
                "merge": false,
                "sql":"select device,times,update_time from errreqs
                 order by update_time desc
                 limit @{num} offset @{offset}"
            }
        ]
    }]
},

{
    "name": "remove",
    "method":"DELETE",
    "property" : "private",
    "tokenChecker":"USER",
    "aclChecker":"RBAC",
    "comment":"删除错误请求",
    
    "request": [
        {"name":"code", "type":"STRING", "must":true, "min":0, "comment":"错误设备号"}
    ],

    "process" : [{
        "name" : "rmv_errreqs",
        "type" : "rdb",
        "db":"device",
        "sqls": [
            "delete from errreqs where device='@{code}'"
        ]
    }]
},
{
    "name": "excess",
    "method":"GET",
    "property" : "private",
    "tokenChecker":"USER",
    "aclChecker":"RBAC",
    "comment":"查看过量请求",
    
    "request": [
        {"name":"offset", "type":"int", "must":true, "min":0, "comment":"开始"},
        {"name":"num", "type":"int", "must":true, "min":5, "comment":"查询数量"}
    ],

    "process" : [{
        "name" : "get_excess_devices",
        "type" : "rdb",
        "db":"device",
        "sqls": [
            {
                "name": "get_total",
                "metas" : "each",
                "multi": false,
                "merge": true,
                "sql":"select count(*) total from reqtimes where times>10"
            },
            {
                "name": "list",
                "metas" : "cols",
                "multi": true,
                "merge": false,
                "sql":"select device,times,day from reqtimes where times>10
                 order by times desc
                 limit @{num} offset @{offset}"
            }
        ]
    }]
},

{
    "name": "removeExcess",
    "method":"DELETE",
    "property" : "private",
    "tokenChecker":"USER",
    "aclChecker":"RBAC",
    "comment":"删除过量请求记录",
    
    "request": [
        {"name":"code", "type":"STRING", "must":true, "min":0, "comment":"错误设备号"},
        {"name":"day", "type":"int", "must":true, "min":0, "comment":"UTC天"}
    ],

    "process" : [{
        "name" : "rmv_errreqs",
        "type" : "rdb",
        "db":"device",
        "sqls": [
            "delete from reqtimes where device='@{code}' and day=@{day}"
        ]
    }]
}
]