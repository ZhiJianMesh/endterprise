[ //只有在单例模式运行的服务端才会调用此接口，比如安卓服务器中
{
    "name": "register",
    "property" : "private",
    "tokenChecker": "OMPWD",
    "method": "POST",
    "comment":"在bios中安装服务，包括建库、初始化表、建路由等",

    "request": [
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}", "comment":"服务名"},
        {"name":"partId", "type":"int", "must":true, "min":0},
        {"name":"addr", "type":"string", "must":true, "min":12, "max":"53"},
        {"name":"key", "type":"string", "must":true, "min":0, "max":2048, "comment":"服务密钥对"},
        {"name":"dependencies", "type":"object", "list":"true", "must":true, "comment":"依赖的服务", "props":[
            {"name":"name", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"},
            {"name":"features", "type":"string", "must":true, "min":0}
        ]},
        {"name":"type", "type":"string", "must":true, "comment":"服务类型"},
        {"name":"visible", "type":"int", "must":false, "default":0, "comment":"0:不可见，1:可见"},
        {"name":"dispName", "type":"string", "must":false, "default":"", "comment":"服务显示名称"},
        {"name":"dbDefines", "type":"object", "list":true, "must":true}
    ],
    
    "process" : [
        {
            "name" : "create_service",
            "type" : "biosmeta",
            "actions" : [
                {"action":"crtDir", "key":"/service/@{service}"},
                {"action":"crtDir", "key":"/service/@{service}/callers"},
                {"action":"crtDir", "key":"/service/@{service}/dbs"},
                {"action":"crtDir", "key":"/service/@{service}/configs"},
                {"action":"putIfAbsent", "key":"/service/@{service}/key", "value":"@{key}", "ignores":["EXISTS"]},
                {"action":"script", "key":"/service/", "value":"[
                    @{FOR|dependencies,`,`,`{\"action\":\"put\",\"key\":\"/service/`,e.name,`/callers/@{service}\",\"value\":\"`,e.features,`\"}`}
                ]"},
                {"action":"script", "key":"/service/@{service}/dbs/", "value":"[
                 @{FOR|dbDefines,`,`,
                 `{\"action\":\"crtDir\",\"key\":\"/service/@{service}/dbs/`, e.name,
                 `\"},{\"action\":\"put\",\"key\":\"/service/@{service}/dbs/`, e.name, `/type\",\"value\":\"`, e.type, `\"}`}
                ]"},
                {"action":"put", "key":"/service/_all_/@{service}",
                 "value":"{type:\"@{type}\",dispName:\"@{dispName}\",visible:@{visible}}"}                
            ]
        }
    ]
}
]