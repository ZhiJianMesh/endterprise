[
{
    "name": "create",
    "method":"POST",
    "property" : "private",
    "tokenChecker": "MNT",
    "comment":"创建数据库",
    
    "request": [
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"},
        {"name":"db", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"},
        {"name":"type", "type":"string", "must":true, "options":["rdb","tdb","sdb"]}
    ],
    "process" : [
        {
            "name" : "createDb",
            "type" : "biosmeta",
            "actions" : [
                {"action":"crtDir", "key":"/service/@{service}/dbs"},
                {"action":"crtDir", "key":"/service/@{service}/dbs/@{db}"},
                {"action":"put", "key":"/service/@{service}/dbs/@{db}/tabledef", "value":""},
                {"action":"put", "key":"/service/@{service}/dbs/@{db}/type", "value":"@{type}"}
            ]
        }
    ]
},

{
    "name": "remove",
    "property" : "private",
    "tokenChecker": "MNT",
    "method":"DELETE",
    "comment":"删除数据库",
    
    "request": [
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"},
        {"name":"db", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"}
    ],
    "process" : [{
        "name" : "rmvDb",
        "type" : "biosmeta",
        "actions" : [
            {"action":"rmvs", "key":"/service/@{service}/dbs/@{db}"},
            {"action":"rmvDir", "key":"/service/@{service}/dbs/@{db}"}
        ]
    }]
},

{
    "name": "list",
    "property" : "private",
    "tokenChecker": "MNT",
    "method": "GET",
    "comment":"列举所有DB",
    
    "request": [
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}", "comment":"服务名称"}
    ],
    
    "process" : [
        {
            "name" : "list",
            "type" : "biosmeta",
            "actions" : [
                {"action":"list", "key":"/service/@{service}/dbs"}
            ]
        }
    ],
    "response":[
        {"name":"dbs", "type":"object", "list":true, "checkAll":true, "props":[
            {"name":"name", "type":"string"}
        ]}
    ]
},

{
    "name": "serviceDbsDetail",
    "property" : "private",
    "tokenChecker": "MNT",
    "method": "GET",
    "comment":"列举服务的所有DB",
    
    "request": [
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}", "comment":"服务名称"}
    ],
    
    "process" : [
        {
            "name" : "list",
            "type" : "biosmeta",
            "actions" : [
                {"action":"getSubs", "key":"/service/@{service}/dbs"}
            ]
        }
    ]   
},

{
    "name": "detail",
    "property" : "private",
    "method": "GET",
    "tokenChecker": "MNT",

    "request": [
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"},
        {"name":"db", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"}
    ],

    "process" : [
        {
            "name" : "detail",
            "type" : "biosmeta",
            "actions": [
                {"action":"get", "key":"/service/@{service}/dbs/@{db}/tabledef"},
                {"action":"get", "key":"/service/@{service}/dbs/@{db}/type"}
            ]
        }
    ]
},

{
    "name": "setTabledef",
    "property" : "private",
    "method": "POST",
    "tokenChecker": "MNT",

    "request": [
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"},
        {"name":"db", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"},
        {"name":"tabledef", "type":"string", "must":true, "min":0, "max":204800}
    ],

    "process" : [{
        "name" : "detail",
        "type" : "biosmeta",
        "actions": [
            {"action":"put", "key":"/service/@{service}/dbs/@{db}/tabledef", "value":"@{tabledef}"}
        ]
    }]
},
{
    "name": "authInfo",
    "property" : "private",
    "tokenChecker": "APP-oauth2",
    "method": "GET",
    "comment":"获取需要Auth的服务的公钥及可以调用的features",
    
    "request": [
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}", "comment":"调用方服务名"},
        {"name":"callee", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}", "comment":"db名称，为了与service.authInfo参数名称保持一直"}
    ],
    "process" : [
        {
            "name" : "authInfo",
            "type" : "biosmeta",
            "actions": [
                {"action":"get", "key":"/service/@{service}/key"},
                {"action":"get", "key":"/service/@{service}/dbs/@{callee}/type", "as":"features"}
            ],
            "onSuccess":"{
                \"publicKey\":\"@{ECKEYPAIR|public,!key}\"
            }"
        }
    ],
    "response":[
        {"name":"features", "type":"string", "must":true},
        {"name":"publicKey", "type":"string", "must":true}
    ]
},

{
    "name": "nodes",
    "property" : "private",
    "tokenChecker": "BIOS",
    "method": "GET",
    "comment":"业务查询DB的节点，首先精确匹配，然后模糊匹配，
        与dbNodes的区别是请求来自db所属的服务，查询服务的数据库节点",
    
    "request": [
        {"name":"dbNo", "type":"int", "must":true, "min":0, "comment":"webdb实例编号"},
        {"name":"partId", "type":"int", "must":false, "min":0, "comment":"分区id"}
    ],

    "vars": [
        {"name":"pid", "val":"@{IFNULL|partId, #tokenPartId, num}"}
    ],
    
    "process" : [
        {
            "name" : "nodes",
            "type" : "biosdb",
            "db":"mesh_status",
            "comment":"第一步，执行最精确查找，找不到，则查找次精确……，公司范围越小越准确",
            "sqls": [{
                "name":"nodes",
                "multi":true,
                "metas" : "each",
                "sql":"select addr,shardStart,shardEnd,slaves,ver,level from dbstatus 
                  where partId=@{pid} and dbNo=@{dbNo} and dbstatus='Y'
                  order by shardStart,level"
            }]
        }
    ]
},

{
    "name": "listConfig",
    "property" : "private",
    "method": "GET",
    "tokenChecker": "MNT",
    "comment":"列举所有数据库配置信息",

    "process" : [{
        "name" : "list_db_config",
        "type" : "biosmeta",
        "actions": [
            {"action":"gets", "key":"/service/webdb/dbs", "as":"list"}
        ]
    }]
},

{
    "name": "getConfig",
    "property" : "private",
    "method": "GET",
    "tokenChecker": "APP-webdb",
    "comment":"按实例的内外ip查询webdb实例的配置信息",

    "process" : [{
        "name" : "get_db_config",
        "type" : "biosmeta",
        "actions": [
            {"action":"get", "key":"/service/webdb/dbs/@{SRCIP}", "as":"cfg"}
        ]
    }]
},

{
    "name": "setConfig",
    "property" : "private",
    "method": "PUT",
    "tokenChecker": "MNT",
    "comment":"设置webdb实例的配置信息，一个实例只能设置一条，但是cfg中可以有多个db",

    "request": [
        {"name":"addr", "type":"ip", "must":true, "format":"V4|LAN|PORT", "comment":"实例带端口号的内网IP"},
        {"name":"cfg", "type":"string", "must":true, "comment":"配置信息，一个list形式的json体字符串"}
    ],

    "process" : [
        {
            "name" : "check_cfg",
            "type" : "js",
            "script":"(function() {
                var jsonCfg=@{cfg};
                for(var d of jsonCfg) {
                    if(isNaN(parseInt(d.no))) {
                        return Mesh.error(RetCode.WRONG_PARAMETER, 'invalid no ' + d.no);
                    }
                    if(isNaN(parseInt(d.shardStart)) || d.shardStart<0
                       || isNaN(parseInt(d.shardEnd)) || d.shardEnd>32768) {
                        return Mesh.error(RetCode.WRONG_PARAMETER, 'invalid shardStart or shardEnd of ' + d.no);
                    }
                    if(d.shardStart>=d.shardEnd) {
                        return Mesh.error(RetCode.WRONG_PARAMETER, 'shardStart>=shardEnd of ' + d.no);
                    }
                }
                return Mesh.success({});
            })()"
        },
        {
            "name" : "set_db_config",
            "type" : "biosmeta",
            "actions": [
                {"action":"put", "key":"/service/webdb/dbs/@{addr}", "value":"@{cfg}"}
            ]
        }
    ],
    "response":[]
},
{
    "name": "checkConfig",
    "property" : "private",
    "method": "GET",
    "tokenChecker": "MNT",
    "comment":"检查配置sharding是否全部覆盖",

    "process" : [
        {
            "name" : "check_cfg",
            "type" : "biosmeta",
            "actions": [
                //不存在时，不会返回NOT_EXISTS，而是返回空数组
                {"action":"gets", "key":"/service/webdb/dbs", "as":"dbs"}
            ],
            
            //检查dbno是否重复，如果重复，会导致客户端请求时错乱
            "onSuccess":"js:(function() {
                var dbs=@{!dbs};
                var nodes,s;
                var shardings={};
                for(var d of dbs) { //addr(name)->cfg(val)
                    nodes=JSON.parse(d.val); //[{no:xx,level:xx,shardStart:xx,shardEnd:..}..]
                    for(var n of nodes) {
                        if(!(s = shardings[n.no])){
                            s=new Array(32768).fill(0);
                            shardings[n.no]=s;
                        }
                        for(var i=n.shardStart;i<n.shardEnd;i++) {
                            if(s[i]!=0) {//重叠分片
                                return Mesh.error(RetCode.DATA_WRONG, 'duplicated sharding,('+n.shardStart+'-'+n.shardEnd+')@'+d.name+'#'+n.no);
                            }
                            s[i]=1;
                        }
                    }
                }

                for(var no in shardings) {//dbNo->sharding
                    s=shardings[no];
                    for(var i in s) {
                        if(s[i]==0) { //未覆盖的分片
                            return Mesh.error(RetCode.DATA_WRONG, 'empty sharding,('+i+')#'+no);
                        }
                    }
                }
                return Mesh.success({});
            })()"
        }
    ],
    "response":[]
},

{
    "name": "removeServer",
    "property" : "private",
    "method": "DELETE",
    "tokenChecker": "MNT",
    "comment":"删除webdb实例",

    "request": [
        {"name":"addr", "type":"ip", "must":true, "format":"V4|LAN|PORT", "comment":"实例带端口号的内网IP"}
    ],

    "process" : [{
        "name" : "set_db_config",
        "type" : "biosmeta",
        "actions": [
            {"action":"rmv", "key":"/service/webdb/dbs/@{addr}"}
        ]
    }]
}
]