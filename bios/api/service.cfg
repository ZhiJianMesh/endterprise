[
{
    "name": "registered",
    "property" : "public",
    "method": "GET",
    "comment":"服务是否已注册，注册过的服务不一定运行，曾经注册过也会留下注册痕迹，
        需要使用activeNodeNum来判断是否真正运行",

    "request": [
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"}
    ],

    "process" : [{
        "name" : "judge_exists",
        "type" : "biosmeta",
        "actions" : [
            {"action":"dirExists", "key":"/service/@{service}"}
        ]
    }]
},

{
    "name": "activeNodeNum",
    "property" : "private",
    "tokenChecker":"BIOS",
    "method": "GET",
    "comment":"服务是否正在运行，通过判断status中是否有记录，status是定时上报的",

    "request": [
        {"name":"partId", "type":"int", "must":true},
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"}
    ],

    "process" : [{
        "name" : "get_node_num",
        "type" : "biosdb",
        "db":"mesh_status",
        "sqls" : [{
            "name":"get_node_num",
            "multi":false,
            "merge":true,
            "metas" : "each",
            "sql":"select count(*) nodeNum from srvstatus
             where partId=@{partId} and service='@{service}'
              and srvstatus='Y' and update_time>@{#reqAt}-600000"
        }]
    }]
},

{
    "name": "create",
    "property" : "private",
    "tokenChecker": "MNT",
    "method": "POST",
    "comment":"创建服务，并返回当前使用的密钥对。
        如果服务创建过，则返回的不是请求的密钥对，而是以前的密钥对。
        此接口在公司注册或登录后使用，将所在节点的服务信息注册到bios中",

    "request": [
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"},
        {"name":"type", "type":"string", "must":true, "comment":"公司类型"},
        {"name":"visible", "type":"int", "must":false, "default":0, "comment":"0:不可见，1:可见"},
        {"name":"dispName", "type":"string", "must":false, "default":"", "comment":"服务显示名称"},
        {"name":"key", "type":"string", "must":true, "min":1, "max":2048, "comment":"服务密钥对"}
    ],
    
    "process" : [{
        "name" : "create_service",
        "type" : "biosmeta",
        "actions" : [
            {"action":"crtDir", "key":"/service/@{service}"},
            {"action":"crtDir", "key":"/service/@{service}/callers"},
            {"action":"crtDir", "key":"/service/@{service}/dbs"},
            {"action":"crtDir", "key":"/service/@{service}/configs"},
            {"action":"putIfAbsent", "key":"/service/@{service}/key", "value":"@{key}"},
            {"action":"put", "key":"/service/_all_/@{service}",
             "value":"{type:\"@{type}\",dispName:\"@{dispName}\",visible:@{visible}}"},
            
            {"action":"get", "key":"/service/@{service}/key", "as":"key"}
        ]
    }]
},

{
    "name": "remove",
    "method": "delete",
    "property" : "private",
    "tokenChecker": "MNT",
    "comment":"删除服务",
    
    "request": [
        {"name":"service", "type":"string", "must":true, "min":1, "max":255, "regular":"[0-9a-zA-Z_]{1,30}"}
    ],
    
    "process" : [{
        "name" : "rmvService",
        "type" : "biosmeta",
        "actions" : [
            {"action":"rmvDir", "key":"/service/@{service}/dbs",
             "comment":"如果数据库未先删除，则无法删除服务"},
            {"action":"rmv", "key":"/service/@{service}/key"},
            {"action":"rmvs", "key":"/service/@{service}/callers"},
            {"action":"rmvs", "key":"/service/@{service}/configs"},
            {"action":"rmvDir", "key":"/service/@{service}/callers"},
            {"action":"rmvDir", "key":"/service/@{service}/configs"},
            {"action":"rmvDir", "key":"/service/@{service}"},
            {"action":"rmv", "key":"/service/_all_/@{service}"}
        ]
    }]
},

{
    "name": "list",
    "property" : "private",
    "tokenChecker": "MNT",
    "method": "GET",
    "comment":"列举所有服务目录",

    "process" : [{
        "name" : "list",
        "type" : "biosmeta",
        "actions" : [
            {"action":"getsMap", "key":"/service/_all_", "as":"services"}
        ]
    }]
},

{
    "name": "detail",
    "property" : "private",
    "tokenChecker": "MNT",
    "method": "GET",
    "comment":"列举服务的配置",

    "request": [
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"}
    ],
    
    "process" : [{
        "name" : "detail",
        "type" : "biosmeta",
        "actions" : [
            {"action":"get", "key":"/service/@{service}/key", "ignores":["NOT_EXISTS"]},
            {"action":"gets", "key":"/service/@{service}/callers"},
            {"action":"get", "key":"/service/@{service}/dbNo", "default":"0"},
            {"action":"gets", "key":"/service/@{service}/configs"},
            {"action":"getSubsAndItems", "key":"/service/@{service}/dbs"}
        ]
    }]
},

{
    "name": "getKey",
    "property" : "private",
    "tokenChecker":"OMPWD",
    "method": "GET",
    "comment":"获取服务密钥对",

    "request": [
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}", "comment":"服务名"}
    ],

    "vars": [
        {"name":"newKey", "val":"@{ECKEYPAIR}", "comment":"服务密钥对"}
    ],

    "process" : [{
        "name" : "get_service_key",
        "type" : "biosmeta",
        "actions" : [ //先创建，防止原本没有，如果存在，则使用原有的
            {"action":"crtDir", "key":"/service/@{service}"},
            {"action":"putIfAbsent", "key":"/service/@{service}/key", "value":"@{newKey}", "ignores":["EXISTS"]},
            {"action":"get", "key":"/service/@{service}/key", "as":"key"}
        ]
    }]
},

{
    "name": "getPubKey",
    "property" : "public",
    "method": "GET",
    "comment":"获取公钥，公钥是可以公开的",

    "request": [
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"}
    ],

    "process" : [{
        "name" : "keys",
        "type" : "biosmeta",
        "actions" : [
            {"action":"get", "key":"/service/@{service}/key"}
        ],
        "onSuccess":"{
            \"publicKey\":\"@{ECKEYPAIR|public,!key}\"
        }"
    }],
    
    "response":[ //key中私钥不能返回，所以在此过滤
        {"name":"publicKey", "type":"string", "must":true}
    ]
},

{
    "name": "setKey",
    "property" : "private",
    "tokenChecker": "MNT",
    "method": "PUT",
    "comment":"设置服务密钥对",
    
    "request": [
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"},
        {"name":"key", "type":"string", "must":true, "min":1, "max":2048}
    ],
    "process" : [{
        "name" : "set_service_key",
        "type" : "biosmeta",
        "actions" : [
            {"action":"put", "key":"/service/@{service}/key", "value":"@{key}"}
        ]
    }]
},

{
    "name": "setConfig",
    "property" : "private",
    "tokenChecker": "MNT",
    "method": "PUT",
    "comment":"OM设置配置项",
    
    "request": [
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"},
        {"name":"name", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"},
        {"name":"val", "type":"string", "must":true, "max":20480}
    ],
    "process" : [{
        "name" : "set_config_item",
        "type" : "biosmeta",
        "actions" : [
            {"action":"put", "key":"/service/@{service}/configs/@{name}", "value":"@{val}"}
        ]
    }]
},

{
    "name": "setConfigIfAbsent",
    "property" : "private",
    "tokenChecker": "MNT",
    "method": "POST",
    "comment":"OM设置配置项，如果存在，则不做任何操作",

    "request": [
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"},
        {"name":"name", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"},
        {"name":"val", "type":"string", "must":true, "max":20480}
    ],
    "process" : [{
        "name" : "set_config_item",
        "type" : "biosmeta",
        "actions" : [
            {"action":"putIfAbsent", "key":"/service/@{service}/configs/@{name}", "value":"@{val}", "ignores":["EXISTS"]},
            {"action":"get", "key":"/service/@{service}/configs/@{name}"}
        ]
    }]
},

{
    "name": "removeConfig",
    "property" : "private",
    "tokenChecker": "MNT",
    "method": "DELETE",
    "comment":"OM删除配置项",
    
    "request": [
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"},
        {"name":"name", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"}
    ],
    "process" : [{
        "name" : "rmvConfigItem",
        "type" : "biosmeta",
        "actions" : [
            {"action":"rmv", "key":"/service/@{service}/configs/@{name}"}
        ]
    }]
},

{
    "name": "getConfigs",
    "property" : "private",
    "tokenChecker": "MNT",
    "method": "GET",
    "comment":"OM查询服务的所有配置项",
    
    "request": [
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"}
    ],
    "process" : [{
        "name" : "list",
        "type" : "biosmeta",
        "actions" : [
            {"action":"gets", "key":"/service/@{service}/configs"}
        ]
    }]
},

{
    "name": "getConfig",
    "property" : "private",
    "tokenChecker": "MNT",
    "method": "GET",
    "comment":"OM获取指定的配置项",
    
    "request": [
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"},
        {"name":"name", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"}
    ],
    "process" : [{
        "name" : "getConfigItem",
        "type" : "biosmeta",
        "actions" : [
            {"action":"get", "key":"/service/@{service}/configs/@{name}"}
        ]
    }]
},

{
    "name": "addCaller",
    "property" : "private",
    "tokenChecker": "MNT",
    "method": "POST",
    "comment":"增加服务调用方",
    
    "request": [
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"},
        {"name":"caller", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"},
        {"name":"features", "type":"string", "must":true, "regular":"[0-9a-zA-Z_,\\*]{1,255}"}
    ],

    "process" : [
        {
            "name" : "addNode",
            "type" : "biosmeta",
            "actions": [
                {"action":"put","key":"/service/@{service}/callers/@{caller}", "value":"@{features}"},
                {"action":"gets","key":"/service/@{service}/callers"}
            ]
        }
    ]
},

{
    "name": "removeCaller",
    "property" : "private",
    "tokenChecker": "MNT",
    "method": "DELETE",
    "comment":"删除服务调用方",
    
    "request": [
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"},
        {"name":"caller", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"}
    ],

    "process" : [
        {
            "name" : "removeCaller",
            "type" : "biosmeta",
            "actions":[
                {"action":"rmv", "key":"/service/@{service}/callers/@{caller}"},
                {"action":"gets","key":"/service/@{service}/callers"}
            ]
        }
    ]
},

{
    "name": "authInfo",
    "property" : "private",
    "tokenChecker": "APP-oauth2",
    "method": "GET",
    "comment":"获取服务的公钥及可以调用的features，oAuth2调用，用于verify",
    
    "request": [
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}", "comment":"即caller"},
        {"name":"callee", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}", "comment":"被service调用的被调方"}
    ],
    "process" : [
        {
            "name" : "authInfo",
            "type" : "biosmeta",
            "actions": [
                {"action":"get", "key":"/service/@{callee}/callers/@{service}", "as":"features"},
                {"action":"get", "key":"/service/@{service}/key"}
            ],
            "onSuccess":"{
                \"publicKey\":\"@{ECKEYPAIR|public,!key}\"
            }"
        }
    ],
    "response":[
        {"name":"features", "type":"string", "must":true},
        {"name":"publicKey", "type":"string", "must":true}
    ]
},

{
    "name": "nodes",
    "property" : "private",
    "tokenChecker": "BIOS",
    "method": "GET",
    "comment":"调用方查询被调服务的节点，取服务节点信息的操作有缓存，所以做调用限制，没有多大意义",
    
    "request": [
    	{"name":"partId", "type":"int", "must":false, "min":0, "comment":"分区id"},
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"}
    ],
     
    "vars": [
        {"name":"pid", "val":"@{IFNULL|partId, #tokenPartId, num}"}
    ],

    "process" : [{
        "name" : "nodes",
        "type" : "biosdb",
        "db":"mesh_status",
        "sqls": [{
            "comment":"第一步，在相同分区查找，找不到，则在公共分区查找……",
            "name":"nodes",
            "multi":true,
            "sql":"
             select addr,ver from srvstatus
              where service='@{service}'
              and partId=@{#tokenPartId}
              and srvstatus='Y'
             union
             select addr,ver from srvstatus
              where service='@{service}'
              and partId<1024 and srvstatus='Y'
              order by addr
            "
        }]
    }]
},

{
    "name": "dbno",
    "property" : "private",
    "tokenChecker":"BIOS",
    "method": "GET",
    "comment":"在私有云或非公司服务，db编号用服务名区分，可将不同服务的数据库放到不同的db实例上；
        在至简网格中且为公司服务时，在company服务指定数据库编号，
        也就是说，一个公司所有服务的数据库都在一个db实例上，
        如果一个实例放不下，就需要将它独立出去单独一个集群部署",

    "process" : [{
        "name" : "get_dbNo",
        "type" : "biosmeta",
        "actions" : [
            {"action":"get", "key":"/service/@{#tokenCaller}/dbNo"}
        ]
    }]
},

{
    "name": "setDbNo",
    "property" : "private",
    "tokenChecker":"MNT",
    "method": "PUT",
    "comment":"设置服务所用数据库编号，不设置，默认为0",
    
    "request": [
        {"name":"no", "type":"int", "must":true, "min":0, "comment":"数据库实例编号"},
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"}
    ],
    
    "process" : [{
        "name" : "set_dbNo",
        "type" : "biosmeta",
        "actions" : [
            {"action":"put", "key":"/service/@{service}/dbNo", "val":"@{no}"}
        ]
    }]
}
]