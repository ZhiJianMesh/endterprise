[
{
    "name": "getTokenPwd",
    "property" : "private",
    "tokenChecker":"COMPANY",
    "aclChecker":"ABAC",
    "method": "GET",
    "comment":"获取公司临时远程运维密码",

    "aclProcess":[{"macro": "is_admin"}],
    
    "process" : [{
        "name" : "get_remote_token_key",
        "type" : "biosmeta",
        "actions" : [ //先创建，防止原本没有，如果存在，则使用原有的
            {"action":"crtDir", "key":"/service/om/keys/@{#tokenCid}"},
            {"action":"get", "key":"/service/om/keys/@{#tokenCid}", "as":"key"}
        ]
    }]
},
{
    "name": "setTokenPwd",
    "property" : "private",
    "tokenChecker":"COMPANY",
    "aclChecker":"ABAC",
    "method": "PUT",
    "comment":"设置公司临时远程运维密码",

    "request": [
        {"name":"pwd", "type":"String", "comment":"随机密码"}
    ],
    
    "aclProcess":[{"macro": "is_admin"}],
    
    "process" : [{
        "name" : "set_remote_token_key",
        "type" : "biosmeta",
        "actions" : [ //先创建路径，防止原本没有
            {"action":"crtDir", "key":"/service/om/keys/@{#tokenCid}"},
            {"action":"put", "key":"/service/om/keys/@{#tokenCid}", "value":"@{pwd},@{#reqAt}"}
        ]
    }]
},

{
    "name": "getTotpPwd",
    "property" : "private",
    "tokenChecker":"COMPANY",
    "method": "GET",
    "comment":"获取运维TOTP密码",

    "process" : [{
        "name" : "get_totp_key",
        "type" : "biosmeta",
        "actions" : [
            {"action":"get", "key":"/service/om/keys/totp", "as":"key"}
        ]
    }]
},

{
    "name": "setTotpPwd",
    "property" : "private",
    "tokenChecker":"COMPANY",
    "aclChecker":"ABAC",
    "method": "PUT",
    "comment":"设置TOTP运维密码",

    "vars": [
        {"name":"pwd", "val":"@{RANDOM|s,10,32}", "toResp":true, "comment":"随机密码"}
    ],

    "aclProcess":[{"macro": "is_admin"}],

    "process" : [{
        "name" : "set_totp_key",
        "type" : "biosmeta",
        "actions" : [
            {"action":"put", "key":"/service/om/keys/totp", "value":"@{pwd}"}
        ]
    }]
}
]