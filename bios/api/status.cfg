[
{
    "name": "srvinit",
    "property" : "private",
    "tokenChecker": "BIOS",
    "method": "POST",
    "comment":"Service节点启动后，第一次创建节点的基本信息",

    "request": [
        {"name":"partId", "type":"int", "must":true},
        {"name":"service", "type":"string", "must":true, "regular":"^[0-9a-zA-Z_]{1,30}$"},
        {"name":"addr", "type":"string", "must":true, "min":12, "max":"53"},
        {"name":"ver", "type":"int", "must":true, "min":0}
    ],
    
    "process" : [{
        "name" : "save_srvs_status",
        "type" : "biosdb",
        "db":"mesh_status",
        "sqls" : [
            "insert or ignore into srvstatus(partId,service,addr,srvstatus,ver)
             values(@{partId},'@{service}','@{addr}','N',@{ver})",

            "update srvstatus set ver=@{ver},srvstatus='N'
              where partId=@{partId} and service='@{service}' and addr='@{addr}'"
        ]
    }]
},

{
    "name": "srvreports",
    "property" : "private",
    "tokenChecker": "APP-backend",
    "method": "POST",
    "comment":"Service节点启动后，定时刷新状态信息",
    
    "request": [
        {"name":"partId", "type":"int", "must":true},
        {"name":"addr", "type":"string", "must":true, "min":12, "max":"53"},
        {"name":"services", "type":"object", "must":true, "list":true, "minSize":1, "props":[
            {"name":"name", "type":"string", "must":true, "regular":"^[0-9a-zA-Z_]{1,30}$"},
            {"name":"ver", "type":"int", "must":true, "min":0}
        ]}
    ],
    
    "process" : [{
        "name" : "save_srvs_status",
        "type" : "biosdb",
        "db":"mesh_status",
        "sqls" : [
            "rs:@{FOR|services, `;`, `update srvstatus set srvstatus='N',ver=`, e.ver,
             ` where partId=@{partId} and service='`, e.name, `' and addr='@{addr}'`}"
        ]
    }]
},

{
    "name": "dbreport",
    "property" : "private",
    "tokenChecker": "BIOS",
    "method": "POST",
    "comment":"DB节点启动后，定期刷新状态",
    
    "request": [
        {"name":"partId", "type":"int", "must":true},
        {"name":"addr", "type":"string", "must":true, "min":12, "max":"53"},
        {"name":"dbs", "type":"object", "list":true, "minSize":1, "must":true,
         "props":[
            {"name":"no", "type":"int", "must":true, "min":0, "comment":"webdb实例编号"},
            {"name":"shardStart", "type":"int", "must":true},
            {"name":"status", "type":"string", "must":true, "options":["N","B"]}
        ]}
    ],

    "process" : [{
            "name" : "save_db_status",
            "type" : "biosdb",
            "db":"mesh_status",
            "sqls" : [
                "rs:@{FOR|dbs, `;`, `update dbstatus set dbstatus='`, e.status,
                  `' where partId=@{partId} and dbNo=`,
                  e.no, ` and shardStart=`, e.shardStart, ` and addr='@{addr}'`}"
            ]
    }]
},

{
    "name": "dbinit",
    "property" : "private",
    "tokenChecker": "BIOS",
    "method": "POST",
    "comment":"DB节点启动后，第一次创建节点的基本信息",
    
    "request": [
        {"name":"partId", "type":"int", "must":true},
        {"name":"addr", "type":"string", "must":true, "min":12, "max":"53"},
        {"name":"ver", "type":"string", "must":true, "max":10},
        {"name":"dbs", "type":"object", "list":true, "minSize":1, "must":true,
         "props":[
            {"name":"no", "type":"int", "must":true, "min":0, "comment":"webdb实例编号"},
            {"name":"level", "type":"int", "must":true},
            {"name":"slaves", "type":"string", "must":false, "min":0, "default":""},
            {"name":"status", "type":"string", "must":true, "options":["N","B"]},
            {"name":"shardStart", "type":"int", "must":true},
            {"name":"shardEnd", "type":"int", "must":true}
        ]}
    ],

    "process" : [{
            "name" : "save_db_status",
            "type" : "biosdb",
            "db":"mesh_status",
            "sqls" : [
                //异常退出时可能没有及时删除数据，直接insert会失败
                "rs:@{FOR|dbs, `;`, `insert or ignore into dbstatus(partId,dbNo,addr,ver,dbstatus,shardStart,shardEnd,level,slaves)
                 values(@{partId},`, e.no, `,'@{addr}',@{ver},'`, e.status, `',`, e.shardStart, `,`, e.shardEnd, `,`, e.level, `,'`, e.slaves, `')`}",
                 
                "rs:@{FOR|dbs, `;`, `update dbstatus set dbstatus='`, e.status,
                 `',slaves='`, e.slaves, `',shardEnd=`, e.shardEnd,
                 ` where partId=@{partId} and dbNo=`, e.no,
                 ` and shardStart=`, e.shardStart, ` and addr='@{addr}'`}"
            ]
    }]
},

{
    "name": "srvremove",
    "property" : "private",
    "tokenChecker": "BIOS",
    "method": "DELETE",
    "comment":"删除服务的状态，并没有删除记录，只是将srvstatus标记为E",
    
    "request": [
        {"name":"partId", "type":"int", "must":true},
        {"name":"service", "type":"string", "must":true, "min":0, "max":60},
        {"name":"addr", "type":"string", "must":true, "min":12, "max":"53"}
    ],

    "process" : [
        {
            "name" : "rmvService",
            "type" : "biosdb",
            "db":"mesh_status",
            "sqls" : [
                "update srvstatus set srvstatus='E' where partId=@{partId}
                 and service='@{service}' and addr='@{addr}'"
            ]
        }
    ]
},

{
    "name": "dbremove",
    "property" : "private",
    "tokenChecker": "BIOS",
    "method": "POST",
    "comment":"删除数据库的状态记录",
    
    "request": [
        {"name":"partId", "type":"int", "must":true},
        {"name":"addr", "type":"string", "must":true, "min":12, "max":"53"},
        {"name":"dbs", "type":"object", "list":true, "minSize":1, "must":true,
         "props":[
            {"name":"no", "type":"int", "must":true, "comment":"webdb实例编号"},
            {"name":"shardStart", "type":"int", "must":true}
        ]}
    ],
    "process" : [
        {
            "name" : "rmvDb",
            "type" : "biosdb",
            "db":"mesh_status",
            "sqls" : ["rs:
                @{FOR|dbs,`;`,`update dbstatus set dbstatus='E'
                 where partId=@{partId} and dbNo=`,
                 e.no,` and shardStart=`,e.shardStart,` and addr='@{addr}'`}
            "]
        }
    ]
},

{
    "name": "srvlist",
    "property" : "private",
    "tokenChecker": "MNT", //可以用OM认证或公司认证
    "method": "GET",
    "comment":"列举一个内的所有服务的状态",

    "request": [
        {"name":"partId", "type":"int", "must":false, "min":0, "comment":"分区id"},
        {"name":"offset", "type":"int", "must":false, "min":0, "default":0},
        {"name":"num", "type":"int", "must":false, "min":0, "default":"2147483647"}
    ],
     
    "vars": [
        {"name":"pid", "val":"@{IFNULL|partId, #tokenPartId, num}"}
    ],
    
    "process" : [{
        "name" : "list",
        "type" : "biosdb",
        "db":"mesh_status",
        "sqls" : [
            {
                "name":"get_total",
                "multi":false,
                "merge":true,
                "metas" : "each",
                "sql":"select count(*) as total from srvstatus where partId=@{pid}"
            },
            {
                "name":"list",
                "multi":true,
                "metas" : "each",
                "sql":"select service,partId,addr,srvstatus 'status',ver
                 from srvstatus where partId=@{pid}
                 order by service
                 LIMIT @{num} OFFSET @{offset}"
            }
        ]
    }]
},

{
    "name": "dblist",
    "property" : "private",
    "tokenChecker": "MNT",
    "method": "GET",
    "comment":"列举所有数据库实例的状态，包括当前无效的",

    "request": [
        {"name":"partId", "type":"int", "must":false, "min":0, "comment":"分区id"},
        {"name":"offset", "type":"int", "must":false, "min":0, "default":0},
        {"name":"num", "type":"int", "must":false, "min":0, "default":"2147483647"}
    ],
     
    "vars": [
        {"name":"pid", "val":"@{IFNULL|partId, #tokenPartId, num}"}
    ],
       
    "process" : [{
        "name" : "list",
        "type" : "biosdb",
        "db":"mesh_status",
        "sqls" : [
            {
                "name":"get_total",
                "multi":false,
                "merge":true,
                "metas" : "each",
                "sql":"select count(*) as total from dbstatus where partId=@{pid}"
            },
            {
                "name":"list",
                "multi":true,
                "metas" : "each",
                "sql":"select partId,dbNo,dbstatus 'status',ver,level,addr,slaves,shardStart,shardEnd
                    from dbstatus where partId=@{pid}
                    order by dbNo
                    LIMIT @{num} OFFSET @{offset}"
            }
        ]
    }]
},

{
    "name": "dbstatus",
    "property" : "private",
    "tokenChecker": "MNT",
    "method": "GET",
    "comment":"列举list中指定的数据库实例的状态",

    "request": [
        {"name":"partId", "type":"int", "must":false, "min":0, "comment":"分区id"},
        {"name":"list", "type":"string", "must":true, "min":1, "comment":"以逗号分隔的数据库no列表"}
    ],

    "vars": [
        {"name":"pid", "val":"@{IFNULL|partId, #tokenPartId, num}"}
    ],

    "process" : [{
        "name" : "list",
        "type" : "biosdb",
        "db":"mesh_status",
        "sqls" : [{
            "name":"list",
            "multi":true,
            "metas":"each",
            "sql":"select partId,dbNo,dbstatus 'status',ver,level,addr,slaves,shardStart,shardEnd
                from dbstatus where partId=@{pid} and dbNo in(@{list})
                order by dbNo"
        }]
    }]
},

{
    "name": "srvdetail",
    "property" : "private",
    "tokenChecker": "MNT",
    "method": "GET",
    "comment":"列举服务的配置",

    "request": [
        {"name":"partId", "type":"int", "must":false, "min":0, "comment":"分区id"},
        {"name":"service", "type":"string", "must":true, "min":0, "max":60},
        {"name":"addr", "type":"string", "must":true, "min":12, "max":"53"}
    ],
    
    "vars": [
        {"name":"pid", "val":"@{IFNULL|partId, #tokenPartId, num}"}
    ],
    
    "process" : [
        {
            "name" : "detail",
            "type" : "biosdb",
            "db":"mesh_status",
            "sqls" : [{
                "name":"detail",
                "multi":false,
                "metas" : "each",
                "merge":true,
                "sql":"select srvstatus 'status',ver from srvstatus
                 where partId=@{pid} and service='@{service}' and addr='@{addr}'"
            }]
        }
    ]
},

{
    "name": "serviceNodes",
    "property" : "private",
    "tokenChecker": "MNT",
    "method": "GET",
    "comment":"管理平台查询服务的节点",
    
    "request": [
        {"name":"partId", "type":"int", "must":false, "min":0, "comment":"分区id"},
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"}
    ],
    
    "vars": [
        {"name":"pid", "val":"@{IFNULL|partId, #tokenPartId, num}"}
    ],
    
    "process" : [{
        "name" : "nodes",
        "type" : "biosdb",
        "db":"mesh_status",
        "sqls": [{
            "name":"nodes",
            "multi":true,
            "sql":"select addr,ver,srvstatus status,partId from srvstatus 
              where partId=@{pid} and service='@{service}' and srvstatus='N'"
        }]
    }]
}
]