[
{
    "name": "srvreport",
    "property" : "private",
    "tokenChecker": "BIOS",
    "method": "POST",
    "comment":"Service节点启动后，第一次创建节点的基本信息",
    
    "request": [
        {"name":"partId", "type":"int", "must":true},
        {"name":"service", "type":"string", "must":true, "regular":"^[0-9a-zA-Z_]{1,30}$"},
        {"name":"addr", "type":"string", "must":true, "min":12, "max":"53"},
        {"name":"ver", "type":"int", "must":true, "min":0}
    ],
    
    "process" : [{
        "name" : "save_srv_status",
        "type" : "biosdb",
        "db":"mesh_status",
        "sqls" : [
            "replace into srvstatus(partId,service,addr,srvstatus,ver)
             values(@{partId},'@{service}','@{addr}','Y',@{ver})"
        ]
    }]
},

{
    "name": "srvreports",
    "property" : "private",
    "tokenChecker": "APP-backend",
    "method": "POST",
    "comment":"Service节点启动后，第一次创建节点的基本信息",
    
    "request": [
        {"name":"partId", "type":"int", "must":true},
        {"name":"addr", "type":"string", "must":true, "min":12, "max":"53"},
        {"name":"services", "type":"object", "must":true, "list":true, "minSize":1, "props":[
            {"name":"name", "type":"string", "must":true, "regular":"^[0-9a-zA-Z_]{1,30}$"},
            {"name":"ver", "type":"int", "must":true, "min":0}
        ]}
    ],
    
    "process" : [{
        "name" : "save_srv_status",
        "type" : "biosdb",
        "db":"mesh_status",
        "sqls" : [
            "replace into srvstatus(partId,service,addr,srvstatus,ver) values
            @{FOR|services, `,`, `(@{partId},'`, e.name, `','@{addr}','Y',`, e.ver, `)`}"
        ]
    }]
},

{
    "name": "dbreport",
    "property" : "private",
    "tokenChecker": "BIOS",
    "method": "POST",
    "comment":"DB节点启动后，第一次创建节点的基本信息",
    
    "request": [
        {"name":"partId", "type":"int", "must":true},
        {"name":"addr", "type":"string", "must":true, "min":12, "max":"53"},
        {"name":"ver", "type":"string", "must":true, "max":10},
        {"name":"dbs", "type":"object", "list":true, "minSize":1, "must":true,
         "props":[
            {"name":"no", "type":"int", "must":true, "min":0, "comment":"webdb实例编号"},
            {"name":"level", "type":"int", "must":true},
            {"name":"slaves", "type":"string", "must":true, "min":0},
            {"name":"shardStart", "type":"int", "must":true},
            {"name":"shardEnd", "type":"int", "must":true}
        ]}
    ],

    "process" : [
        {
            "name" : "save_db_status",
            "type" : "biosdb",
            "db":"mesh_status",
            "sqls" : ["
                replace into dbstatus(partId,dbNo,shardStart,addr,shardEnd,level,dbstatus,ver,slaves) values
                @{FOR|dbs,`,`,`(@{partId},`,e.no,`,`,e.shardStart,`,'@{addr}',`,e.shardEnd,`,`,e.level,`,'Y',@{ver},'`,e.slaves,`')`}
            "]
        }
    ]
},

{
    "name": "srvremove",
    "property" : "private",
    "tokenChecker": "BIOS",
    "method": "DELETE",
    "comment":"删除服务的状态",
    
    "request": [
        {"name":"partId", "type":"int", "must":true},
        {"name":"service", "type":"string", "must":true, "min":0, "max":60},
        {"name":"addr", "type":"string", "must":true, "min":12, "max":"53"}
    ],
    "process" : [
        {
            "name" : "rmvService",
            "type" : "biosdb",
            "db":"mesh_status",
            "sqls" : [
                "delete from srvstatus where partId=@{partId}
                 and service='@{service}' and addr='@{addr}'"
            ]
        }
    ]
},

{
    "name": "dbremove",
    "property" : "private",
    "tokenChecker": "BIOS",
    "method": "POST",
    "comment":"删除数据库的状态记录",
    
    "request": [
        {"name":"partId", "type":"int", "must":true},
        {"name":"addr", "type":"string", "must":true, "min":12, "max":"53"},
        {"name":"dbs", "type":"object", "list":true, "minSize":1, "must":true,
         "props":[
            {"name":"no", "type":"int", "must":true, "comment":"webdb实例编号"},
            {"name":"shardStart", "type":"int", "must":true}
        ]}
    ],
    "process" : [
        {
            "name" : "rmvDb",
            "type" : "biosdb",
            "db":"mesh_status",
            "sqls" : ["rs:
                @{FOR|dbs,`;`,`delete from dbstatus where partId=@{partId} and dbNo=`,
                 e.no,` and shardStart=`,e.shardStart,` and addr='@{addr}'`}
            "]
        }
    ]
},

{
    "name": "srvlist",
    "property" : "private",
    "tokenChecker": "MNT", //可以用OM认证或公司认证
    "method": "GET",
    "comment":"列举一个内的所有服务的状态",

    "request": [
        {"name":"partId", "type":"int", "must":false, "min":0, "comment":"分区id"},
        {"name":"offset", "type":"int", "must":false, "min":0, "default":0},
        {"name":"num", "type":"int", "must":false, "min":0, "default":"2147483647"}
    ],
     
    "vars": [
        {"name":"pid", "val":"@{IFNULL|partId, #tokenPartId, num}"}
    ],
    
    "process" : [{
        "name" : "list",
        "type" : "biosdb",
        "db":"mesh_status",
        "sqls" : [
            {
                "name":"get_total",
                "multi":false,
                "merge":true,
                "metas" : "each",
                "sql":"select count(*) as total from srvstatus where partId=@{pid}"
            },
            {
                "name":"list",
                "multi":true,
                "metas" : "each",
                "sql":"select service,partId,addr,srvstatus 'status',ver
                 from srvstatus where partId=@{pid}
                 order by service
                 LIMIT @{num} OFFSET @{offset}"
            }
        ]
    }]
},

{
    "name": "dblist",
    "property" : "private",
    "tokenChecker": "MNT",
    "method": "GET",
    "comment":"列举所有数据库实例的状态",

    "request": [
        {"name":"partId", "type":"int", "must":false, "min":0, "comment":"分区id"},
        {"name":"offset", "type":"int", "must":false, "min":0, "default":0},
        {"name":"num", "type":"int", "must":false, "min":0, "default":"2147483647"}
    ],
     
    "vars": [
        {"name":"pid", "val":"@{IFNULL|partId, #tokenPartId, num}"}
    ],
       
    "process" : [{
        "name" : "list",
        "type" : "biosdb",
        "db":"mesh_status",
        "sqls" : [
            {
                "name":"get_total",
                "multi":false,
                "merge":true,
                "metas" : "each",
                "sql":"select count(*) as total from dbstatus where partId=@{pid}"
            },
            {
                "name":"list",
                "multi":true,
                "metas" : "each",
                "sql":"select partId,dbNo,dbstatus 'status',ver,level,addr,slaves,shardStart,shardEnd
                    from dbstatus where partId=@{pid}
                    order by dbNo
                    LIMIT @{num} OFFSET @{offset}"
            }
        ]
    }]
},

{
    "name": "status",
    "property" : "private",
    "tokenChecker": "MNT",
    "method": "POST",
    "comment":"列举所有数据库实例的状态",

    "request": [
        {"name":"partId", "type":"int", "must":false, "min":0, "comment":"分区id"},
        {"name":"list", "type":"int", "list":true, "must":true, "minSize":1, "min":0}
    ],

    "vars": [
        {"name":"pid", "val":"@{IFNULL|partId, #tokenPartId, num}"}
    ],

    "process" : [{
        "name" : "list",
        "type" : "biosdb",
        "db":"mesh_status",
        "sqls" : [{
            "name":"list",
            "multi":true,
            "metas":"each",
            "sql":"select partId,dbNo,dbstatus 'status',ver,level,addr,slaves,shardStart,shardEnd
                from dbstatus where partId=@{pid} and dbNo in(@{LIST|list,''})
                order by dbNo"
        }]
    }]
},

{
    "name": "srvdetail",
    "property" : "private",
    "tokenChecker": "MNT",
    "method": "GET",
    "comment":"列举服务的配置",

    "request": [
        {"name":"partId", "type":"int", "must":false, "min":0, "comment":"分区id"},
        {"name":"service", "type":"string", "must":true, "min":0, "max":60},
        {"name":"addr", "type":"string", "must":true, "min":12, "max":"53"}
    ],
    
    "vars": [
        {"name":"pid", "val":"@{IFNULL|partId, #tokenPartId, num}"}
    ],
    
    "process" : [
        {
            "name" : "detail",
            "type" : "biosdb",
            "db":"mesh_status",
            "sqls" : [{
                "name":"detail",
                "multi":false,
                "metas" : "each",
                "merge":true,
                "sql":"select srvstatus 'status',ver from srvstatus
                 where partId=@{pid} and service='@{service}' and addr='@{addr}'"
            }]
        }
    ]
},

{
    "name": "setnodekey",
    "property" : "private",
    "tokenChecker": "BIOS",
    "method": "PUT",
    "comment":"设置节点的临时公钥，此公钥用在tokenChecker为NODE的接口中验证请前方是否来自正确的节点",
    
    "request": [
        {"name":"partId", "type":"int", "must":false, "min":0, "comment":"分区id"},
        {"name":"pubKey", "type":"string", "must":true, "min":10, "max":255, "comment":"临时密钥对的公钥"}
    ],
    
    "vars": [
        {"name":"pid", "val":"@{IFNULL|partId, #tokenPartId, num}"}
    ],
    
    "process" : [{
        "name" : "set_node_key",
        "type" : "biosdb",
        "db":"mesh_status",
        "sqls" : [
            "replace into nodekey(partId, addr, pubKey)
             values(@{pid},'@{SRCIP}','@{pubKey}')"
        ]
    }]
},

{
    "name": "getnodekey",
    "method": "GET",
    "property" : "private",
    "tokenChecker": "BIOS",
    "comment":"获取节点的临时公钥",
    
    "request": [
        {"name":"partId", "type":"int", "must":false, "min":0, "comment":"分区id"},
        {"name":"srcIp", "type":"string", "must":true, "min":7, "comment":"node的地址"}
    ],
    
    "vars": [
        {"name":"pid", "val":"@{IFNULL|partId, #tokenPartId, num}"}
    ],
    
    "process" : [{
        "name" : "get_node_key",
        "type" : "biosdb",
        "db":"mesh_status",
        "sqls" : [{
            "name":"pub_key",
            "multi":false,
            "merge":true,
            "metas":"each",
            "sql":"select pubKey from nodekey
             where partId=@{pid} and addr='@{srcIp}'"
        }]
    }]
},

{
    "name": "serviceNodes",
    "property" : "private",
    "tokenChecker": "MNT",
    "method": "GET",
    "comment":"管理平台查询服务的节点",
    
    "request": [
        {"name":"partId", "type":"int", "must":false, "min":0, "comment":"分区id"},
        {"name":"service", "type":"string", "must":true, "regular":"[0-9a-zA-Z_]{1,30}"}
    ],
    
    "vars": [
        {"name":"pid", "val":"@{IFNULL|partId, #tokenPartId, num}"}
    ],
    
    "process" : [{
        "name" : "nodes",
        "type" : "biosdb",
        "db":"mesh_status",
        "sqls": [{
            "name":"nodes",
            "multi":true,
            "sql":"select addr,ver,srvstatus status,partId from srvstatus 
              where partId=@{pid} and service='@{service}' and srvstatus='Y'"
        }]
    }]
}
]