[
{
    "name": "getCommon",
    "property" : "private",
    "method": "GET",
    "tokenChecker": "OMPWD",
    "comment":"从bios中查询公共配置参数，需要提供OM或公司密码",

    "request": [
        {"name":"name", "type":"string", "must":true, "regular":"[_0-9A-Za-z]{1,30}", "comment":"字段名"}
    ],

    "process" : [{
        "name" : "detail",
        "type" : "biosmeta",
        "actions": [
            {"action":"get", "key":"/common/@{name}", "as":"@{name}"}
        ]
    }]
},

{
    "name": "getRoute",
    "property" : "public",
    "method": "GET",
    "comment":"从bios中查询route配置，无需提供OM密码",

    "process" : [{
        "name" : "detail",
        "type" : "biosmeta",
        "actions": [
            {"action":"get", "key":"/common/route", "as":"route"}
        ]
    }]
}
]